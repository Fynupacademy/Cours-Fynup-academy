<style>
/* ─────────────────────────────────────────────────────────────
   FYNUP Course — dark navy + turquoise
   ───────────────────────────────────────────────────────────── */

:root {
  --bg: #FFFFFF;
  --bg-elev: #FAFBFC;
  --bg-sidebar: #F7F8FA;
  --bg-card: #F5F7FA;
  --bg-card-2: #EEF2F6;
  --border: #E4E8EE;
  --border-strong: #CCD3DC;
  --text: #0D1117;
  --text-muted: #4F5763;
  --text-dim: #8A92A0;
  --accent: #00A6D6;
  --accent-dim: rgba(0, 166, 214, 0.22);
  --accent-soft: rgba(0, 166, 214, 0.07);
  --warn: #B07B0E;
  --pos: #1F8A5B;
  --neg: #C24A4A;

  --sans: "Geist", system-ui, -apple-system, sans-serif;
  --serif: "Instrument Serif", "Iowan Old Style", Georgia, serif;
  --mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;

  --sidebar-w: 320px;
  --content-w: 820px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

::selection { background: var(--accent-dim); color: var(--text); }

a { color: inherit; text-decoration: none; }

/* ─── App shell ─── */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 100vh;
}

/* ─── Sidebar ─── */
.sidebar {
  position: sticky; top: 0;
  height: 100vh;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}

.brand {
  padding: 22px 24px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.brand-mark {
  width: 32px; height: 32px;
  flex-shrink: 0;
  display: grid; place-items: center;
}
.brand-text {
  display: flex; flex-direction: column;
  line-height: 1.15;
}
.brand-name {
  font-family: var(--sans);
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.02em;
  color: var(--text);
}
.brand-sub {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--text-muted);
}

.sidebar-search {
  padding: 14px 20px 8px;
}
.sidebar-search input {
  width: 100%;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 12px;
  border-radius: 6px;
  font-family: var(--sans);
  font-size: 13px;
  outline: none;
  transition: border-color .15s;
}
.sidebar-search input::placeholder { color: var(--text-dim); }
.sidebar-search input:focus { border-color: var(--accent); }

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0 20px;
}
.sidebar-nav::-webkit-scrollbar { width: 8px; }
.sidebar-nav::-webkit-scrollbar-track { background: transparent; }
.sidebar-nav::-webkit-scrollbar-thumb {
  background: var(--border-strong);
  border-radius: 4px;
}

.nav-module {
  padding: 16px 20px 6px;
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--text-dim);
}

.nav-chapter {
  display: block;
  padding: 8px 20px 8px 24px;
  margin: 1px 0;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background .12s, border-color .12s, color .12s;
  color: var(--text-muted);
  font-size: 13.5px;
  line-height: 1.4;
}
.nav-chapter:hover {
  background: rgba(0,0,0,0.03);
  color: var(--text);
}
.nav-chapter.active {
  color: var(--text);
  background: var(--accent-soft);
  border-left-color: var(--accent);
}
.nav-chapter-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  margin-right: 8px;
  display: inline-block;
  min-width: 22px;
}
.nav-chapter.active .nav-chapter-num { color: var(--accent); }

.nav-sections {
  padding: 2px 0 6px 46px;
  display: flex; flex-direction: column;
}
.nav-section {
  padding: 4px 0;
  font-size: 12.5px;
  color: var(--text-dim);
  cursor: pointer;
  transition: color .12s;
  line-height: 1.4;
}
.nav-section:hover { color: var(--text-muted); }
.nav-section.current { color: var(--accent); }

/* ─── Main content ─── */
.content {
  padding: 0;
  overflow-x: hidden;
}
.content-inner {
  max-width: var(--content-w);
  margin: 0 auto;
  padding: 64px 56px 120px;
}

/* ─── Reading progress (top of viewport) ─── */
.reading-progress {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left center;
  z-index: 200;
  transition: transform 0.05s linear;
  box-shadow: 0 0 8px var(--accent-dim);
}

/* ─── Sticky chapter bar ─── */
.chapter-bar {
  position: sticky;
  top: 0;
  z-index: 60;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 24px;
  padding: 12px 48px;
  background: rgba(255,255,255,0.88);
  backdrop-filter: saturate(180%) blur(14px);
  -webkit-backdrop-filter: saturate(180%) blur(14px);
  border-bottom: 1px solid var(--border);
}
.chapter-bar-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 14px 7px 11px;
  border-radius: 100px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: border-color .15s, background .15s, color .15s, transform .15s;
}
.chapter-bar-back:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: #FFFFFF;
}
.chapter-bar-back:hover .cb-arrow { transform: translateX(-2px); }
.cb-arrow { transition: transform .15s; font-family: var(--mono); font-size: 14px; }
.cb-text { letter-spacing: 0.01em; }

.chapter-bar-crumb {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.crumb-module {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  flex-shrink: 0;
}
.crumb-sep {
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 11px;
  flex-shrink: 0;
}
.crumb-chapter {
  font-family: var(--sans);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
}

.chapter-bar-meta {
  display: flex; align-items: center; gap: 14px;
}
.cb-progress-num {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
  min-width: 38px;
  text-align: right;
}
.cb-kbd-hints {
  display: inline-flex;
  gap: 3px;
}
.cb-kbd-hints kbd {
  display: inline-grid;
  place-items: center;
  min-width: 18px;
  height: 20px;
  padding: 0 4px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-bottom-width: 2px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
}

/* ─── Chapter layout — content + right rail ─── */
.chapter-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 240px;
  gap: 56px;
  max-width: 1180px;
  margin: 0 auto;
  padding: 56px 48px 120px;
}
.chapter-main {
  max-width: 720px;
  width: 100%;
  justify-self: end;
}
.chapter-toc {
  position: sticky;
  top: 80px;
  align-self: start;
  max-height: calc(100vh - 100px);
  overflow-y: auto;
  padding-left: 18px;
  border-left: 1px solid var(--border);
}
.chapter-toc::-webkit-scrollbar { width: 6px; }
.chapter-toc::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
.chapter-toc-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 14px;
}
.chapter-toc-list {
  list-style: none;
  margin: 0; padding: 0;
}
.chapter-toc-list li {
  display: grid;
  grid-template-columns: 38px 1fr;
  gap: 8px;
  padding: 7px 0;
  cursor: pointer;
  color: var(--text-muted);
  transition: color .15s, transform .15s;
  border-left: 2px solid transparent;
  padding-left: 10px;
  margin-left: -12px;
}
.chapter-toc-list li:hover { color: var(--text); }
.chapter-toc-list li.active {
  color: var(--text);
  border-left-color: var(--accent);
}
.chapter-toc-list .toc-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
}
.chapter-toc-list .toc-title-mini {
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.35;
}
.chapter-toc-foot {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.back-top {
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  cursor: pointer;
  padding: 4px 0;
  transition: color .15s;
}
.back-top:hover { color: var(--accent); }

/* ─── Chapter back-home (end of chapter) ─── */
.chapter-back-home {
  margin-top: 40px;
  display: flex;
  justify-content: center;
}
.chapter-back-home button {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 10px 22px;
  border-radius: 100px;
  font-family: var(--sans);
  font-size: 13px;
  cursor: pointer;
  transition: border-color .15s, color .15s, background .15s;
}
.chapter-back-home button:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}

/* ─── Reveal animation on scroll ─── */
.reveal {
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 0.55s cubic-bezier(.2,.7,.2,1), transform 0.55s cubic-bezier(.2,.7,.2,1);
}
.reveal.in-view {
  opacity: 1;
  transform: translateY(0);
}
@media (prefers-reduced-motion: reduce) {
  .reveal, .reveal.in-view {
    opacity: 1;
    transform: none;
    transition: none;
  }
}

/* ─── Sidebar progress ─── */
.sidebar-progress {
  padding: 14px 20px 4px;
}
.sp-label {
  display: flex; justify-content: space-between;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.sp-label span:last-child { color: var(--accent); }
.sp-bar {
  width: 100%;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.sp-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.5s ease;
  border-radius: 2px;
}

/* ─── Read state in sidebar ─── */
.nav-chapter.read .nav-chapter-num {
  color: var(--accent);
}
.nav-chapter.active.read .nav-chapter-num {
  color: var(--accent);
}

/* ─── Cover CTA ─── */
.cover-cta {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 18px;
  align-items: center;
  margin-top: 28px;
  padding: 18px 22px;
  background: var(--accent-soft);
  border: 1px solid var(--accent-dim);
  border-radius: 10px;
}
.cover-cta-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.cover-cta-title {
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
}
.cover-cta-btn {
  background: var(--accent);
  color: #FFFFFF;
  border: none;
  padding: 12px 22px;
  border-radius: 100px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s, transform .15s, box-shadow .15s;
  white-space: nowrap;
}
.cover-cta-btn:hover {
  background: #0091BC;
  box-shadow: 0 4px 14px rgba(0,166,214,0.25);
  transform: translateY(-1px);
}

/* ─── TOC module progress ─── */
.toc-module-progress {
  margin-left: auto;
  color: var(--accent);
  font-family: var(--mono);
  font-size: 10.5px;
}

/* ─── TOC chapter read state ─── */
.toc-chapter.read .toc-chapter-num { color: var(--accent); }
.toc-chapter.read .toc-chapter-title { color: var(--text-muted); }
.toc-chapter.read .toc-chapter-title::after {
  content: " ✓";
  color: var(--accent);
  font-family: var(--mono);
  font-size: 11px;
}

/* ─── TOC footer ─── */
.toc-footer {
  border-top: 1px solid var(--border);
  padding-top: 24px;
  margin-top: 40px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
}

/* ─── Chapter header ─── */
.chapter-meta {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--accent);
  margin-bottom: 18px;
}
.chapter-meta-divider {
  width: 24px; height: 1px; background: var(--accent);
}

.chapter-title {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 56px;
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin: 0 0 18px;
  color: var(--text);
}
.chapter-title .num {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 400;
  color: var(--accent);
  display: block;
  margin-bottom: 14px;
  letter-spacing: 0.04em;
}

.chapter-lede {
  font-family: var(--serif);
  font-style: italic;
  font-size: 22px;
  line-height: 1.4;
  color: var(--text-muted);
  margin: 0 0 28px;
  max-width: 640px;
}

.chapter-stats {
  display: flex; gap: 24px;
  padding: 14px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 40px;
}
.chapter-stats span { display: inline-flex; align-items: center; gap: 6px; }
.chapter-stats .dot { color: var(--accent); }

/* ─── Section ─── */
.section { margin: 56px 0; scroll-margin-top: 32px; }
.section-num {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
  letter-spacing: 0.08em;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
}
.section-num .tag {
  margin-left: auto;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-size: 10px;
}
.section-title {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 34px;
  line-height: 1.15;
  letter-spacing: -0.01em;
  margin: 0 0 22px;
  color: var(--text);
}
.section p {
  margin: 0 0 16px;
  color: var(--text);
  font-size: 16px;
  line-height: 1.7;
}
.section p.muted { color: var(--text-muted); }

.section h3 {
  font-family: var(--sans);
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text);
  margin: 28px 0 12px;
}

/* ─── Learning objectives ─── */
.objectives {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 22px 26px;
  margin: 30px 0 40px;
}
.objectives-label {
  font-family: var(--mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--accent);
  margin-bottom: 4px;
}
.objectives-title {
  font-family: var(--serif);
  font-style: italic;
  font-size: 20px;
  color: var(--text);
  margin-bottom: 16px;
}
.objectives ol {
  margin: 0; padding: 0; list-style: none;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px 28px;
  counter-reset: obj;
}
.objectives li {
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-muted);
  padding-left: 30px;
  position: relative;
  counter-increment: obj;
}
.objectives li::before {
  content: counter(obj, decimal-leading-zero);
  position: absolute;
  left: 0; top: 1px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
}

/* ─── Key concept ─── */
.keyconcept {
  border-left: 2px solid var(--accent);
  background: var(--accent-soft);
  padding: 16px 20px;
  margin: 22px 0;
  border-radius: 0 6px 6px 0;
}
.keyconcept-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--accent);
  margin-bottom: 4px;
}
.keyconcept-title {
  font-family: var(--serif);
  font-style: italic;
  font-size: 17px;
  color: var(--text);
  margin-bottom: 6px;
}
.keyconcept-body {
  font-size: 14.5px;
  color: var(--text-muted);
  line-height: 1.6;
}
.keyconcept-body strong { color: var(--text); font-weight: 500; }

/* ─── Law article ─── */
.lawarticle {
  background: var(--bg-card-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px 20px;
  margin: 22px 0;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 18px;
  align-items: start;
}
.lawarticle-tag {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--accent);
  white-space: nowrap;
  padding-top: 1px;
}
.lawarticle-tag .ref {
  display: block;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-top: 2px;
}
.lawarticle-body {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.6;
}

/* ─── Callout (IMPORTANT, FISCAL, ATTENTION) ─── */
.callout {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 16px;
  align-items: start;
  padding: 12px 16px;
  margin: 20px 0;
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--text-muted);
  border: 1px dashed var(--border-strong);
  border-radius: 6px;
}
.callout-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--warn);
  padding-top: 2px;
  white-space: nowrap;
}
.callout.fiscal .callout-label { color: var(--warn); }
.callout.attention .callout-label { color: var(--neg); }
.callout.tip .callout-label { color: var(--accent); }
.callout.note .callout-label { color: var(--text-muted); }

/* ─── Two-column compare ─── */
.compare {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 18px;
  margin: 24px 0;
  align-items: stretch;
}
.compare-side {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px 20px;
}
.compare-side .head {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
}
.compare-side .title {
  font-family: var(--serif);
  font-style: italic;
  font-size: 20px;
  color: var(--text);
  margin-bottom: 14px;
}
.compare-side ul { margin: 0; padding: 0; list-style: none; }
.compare-side li {
  font-size: 13.5px;
  color: var(--text-muted);
  margin: 6px 0;
  padding-left: 16px;
  position: relative;
  line-height: 1.5;
}
.compare-side li::before {
  content: "→";
  position: absolute; left: 0;
  color: var(--accent);
  font-family: var(--mono);
  font-size: 11px;
  top: 3px;
}
.compare-side li.plain { padding-left: 0; }
.compare-side li.plain::before { content: ""; }
.compare-divider {
  display: grid;
  place-items: center;
  font-family: var(--mono);
  font-size: 18px;
  color: var(--text-dim);
  width: 30px;
}

/* ─── Journal entry ─── */
.journal {
  margin: 18px 0 22px;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  background: var(--bg-card);
}
.journal-cap {
  background: var(--bg-card-2);
  padding: 8px 14px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  display: flex; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.journal-cap strong { color: var(--text); font-weight: 500; }
.journal table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 12.5px;
}
.journal th {
  text-align: left;
  padding: 8px 14px;
  font-weight: 500;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  background: var(--bg-card-2);
}
.journal td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: top;
}
.journal tr:last-child td { border-bottom: none; }
.journal td.amount { text-align: right; color: var(--accent); white-space: nowrap; }
.journal td.comment { color: var(--text-muted); font-family: var(--sans); font-size: 12.5px; }
.journal td.acct-no { color: var(--text-dim); }
.journal td.acct { color: var(--text); }

/* ─── Data table ─── */
.dtable {
  margin: 18px 0 22px;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.dtable-cap {
  background: var(--bg-card-2);
  padding: 10px 14px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--accent);
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
.dtable table { width: 100%; border-collapse: collapse; }
.dtable th {
  text-align: left;
  padding: 10px 14px;
  font-family: var(--mono);
  font-weight: 500;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
}
.dtable td {
  padding: 9px 14px;
  font-size: 13.5px;
  color: var(--text);
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.dtable tr:last-child td { border-bottom: none; }
.dtable td.dim { color: var(--text-muted); font-size: 13px; }
.dtable td.num, .dtable th.num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
.dtable td.right, .dtable th.right { text-align: right; }
.dtable td.accent { color: var(--accent); font-family: var(--mono); }

.dtable tr.total td {
  background: var(--bg-card);
  font-weight: 500;
  color: var(--text);
  border-top: 1px solid var(--border-strong);
}

/* ─── Formula ─── */
.formula {
  background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-card-2) 100%);
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  padding: 20px 24px;
  margin: 22px 0;
}
.formula-cap {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 8px;
}
.formula-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.formula-sigil {
  font-family: var(--serif);
  font-style: italic;
  color: var(--accent);
  font-size: 18px;
}
.formula-title {
  font-family: var(--serif);
  font-style: italic;
  font-size: 17px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.formula-eq {
  font-family: var(--mono);
  font-size: 17px;
  color: var(--text);
  letter-spacing: 0.01em;
  padding: 10px 0 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.formula-legend {
  display: flex; flex-wrap: wrap; gap: 16px 24px;
  font-size: 12.5px;
  color: var(--text-muted);
}
.formula-legend b {
  color: var(--accent);
  font-family: var(--mono);
  font-weight: 500;
  margin-right: 6px;
}

/* ─── Bullet list ─── */
ul.bullets {
  margin: 14px 0 18px;
  padding: 0;
  list-style: none;
}
ul.bullets li {
  padding: 4px 0 4px 22px;
  position: relative;
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
}
ul.bullets li::before {
  content: "▸";
  color: var(--accent);
  position: absolute; left: 0; top: 4px;
  font-size: 11px;
}

/* ─── Three-up cards (e.g. 3 piliers) ─── */
.threeup {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin: 22px 0;
}
.threeup-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px;
}
.threeup-card .pre {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.threeup-card .ttl {
  font-family: var(--serif);
  font-style: italic;
  font-size: 22px;
  color: var(--text);
  margin-bottom: 6px;
}
.threeup-card .sub {
  font-size: 13px;
  color: var(--text-muted);
}

.fourup {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin: 22px 0;
}
.fourup .threeup-card {
  padding: 14px;
}
.fourup .ttl { font-size: 18px; }

/* ─── TOC/landing page ─── */
.toc {
  padding: 64px 56px 120px;
  max-width: 980px;
  margin: 0 auto;
}

/* ── Cover card ── */
.cover-card {
  border: 1px solid var(--border);
  background:
    radial-gradient(circle at 100% 0%, rgba(0,166,214,0.06) 0%, transparent 50%),
    #FFFFFF;
  border-radius: 14px;
  padding: 40px 48px 36px;
  margin-bottom: 56px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 1px 3px rgba(13,17,23,0.04), 0 8px 32px rgba(13,17,23,0.04);
}
.cover-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent) 0%, transparent 60%);
}
.cover-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 28px;
  margin-bottom: 28px;
  border-bottom: 1px solid var(--border);
}
.cover-edition {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.cover-eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 18px;
}
.cover-meta {
  display: grid;
  grid-template-columns: auto 1fr 1fr 1fr;
  gap: 32px;
  padding-top: 28px;
  margin-top: 28px;
  border-top: 1px solid var(--border);
}
.cover-meta-label {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.cover-meta-value {
  font-family: var(--serif);
  font-size: 38px;
  line-height: 1;
  color: var(--text);
  letter-spacing: -0.02em;
}
.cover-meta-sub {
  font-family: var(--sans);
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: 0;
  margin-left: 4px;
}
.cover-meta-value-sm {
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.35;
}

.toc-section-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-bottom: 14px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border-strong);
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}
.toc-section-label span:first-child { color: var(--accent); }
.toc-section-label span:last-child  { color: var(--text-dim); }
.toc-title {
  font-family: var(--serif);
  font-size: 60px;
  line-height: 1.05;
  letter-spacing: -0.025em;
  margin: 0 0 34px;
  color: var(--text);
}
.toc-title em { color: var(--accent); font-style: italic; }
.toc-lede {
  font-family: var(--serif);
  font-style: italic;
  font-size: 19px;
  color: var(--text-muted);
  max-width: 640px;
  margin: 0;
  line-height: 1.5;
}
.toc-pills {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 56px;
}
.toc-pill {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 5px 12px;
  border: 1px solid var(--border-strong);
  border-radius: 100px;
  color: var(--text-muted);
}
.toc-pill.primary {
  color: var(--accent);
  border-color: var(--accent);
  background: var(--accent-soft);
}

.toc-modules {
  display: grid;
  gap: 8px;
  margin-bottom: 48px;
}
.toc-module {
  border-top: 1px solid var(--border);
  padding-top: 24px;
  margin-top: 20px;
}
.toc-module:first-child { border-top: none; padding-top: 0; margin-top: 0; }
.toc-module-head {
  display: flex; align-items: baseline; gap: 14px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 16px;
}
.toc-module-head .acc { color: var(--accent); }
.toc-chapters {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 32px;
}
.toc-chapter {
  display: grid;
  grid-template-columns: 36px 1fr auto;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: padding .15s;
}
.toc-chapter:hover { padding-left: 6px; }
.toc-chapter:hover .toc-chapter-title { color: var(--accent); }
.toc-chapter-num {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--accent);
}
.toc-chapter-title {
  font-family: var(--serif);
  font-size: 19px;
  color: var(--text);
  transition: color .15s;
  line-height: 1.25;
}
.toc-chapter-meta {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  align-self: center;
}

/* ─── Vertical equation marker (=, +, -) ─── */
.eq-marker {
  display: inline-block;
  font-family: var(--mono);
  color: var(--accent);
  width: 18px; text-align: center;
}

/* ─── In-text concept tag (CO art. xxx) ─── */
.tag-mini {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 1px 6px;
  border-radius: 3px;
  background: var(--accent-soft);
  color: var(--accent);
  vertical-align: middle;
  margin-left: 6px;
}

/* ─── Section ribbon ─── */
.section-ribbon {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  padding: 3px 9px;
  background: var(--accent-soft);
  border-radius: 3px;
  margin-bottom: 12px;
}

/* ─── Footer nav ─── */
.chapter-foot {
  margin-top: 80px;
  padding-top: 32px;
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}
.chapter-foot-link {
  display: block;
  padding: 18px 22px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: border-color .15s, transform .15s;
}
.chapter-foot-link:hover {
  border-color: var(--accent);
}
.chapter-foot-link .dir {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.chapter-foot-link .next-title {
  font-family: var(--serif);
  font-size: 18px;
  color: var(--text);
}
.chapter-foot-link.next { text-align: right; }
.chapter-foot-link.next .dir::after { content: " →"; color: var(--accent); }
.chapter-foot-link.prev .dir::before { content: "← "; color: var(--accent); }

/* ─── Definition list (lexicon) ─── */
.lex {
  display: grid;
  grid-template-columns: 1fr;
  gap: 4px;
  margin: 20px 0;
}
.lex-letter {
  font-family: var(--serif);
  font-style: italic;
  font-size: 36px;
  color: var(--accent);
  border-bottom: 1px solid var(--border);
  padding: 22px 0 4px;
  margin-top: 18px;
}
.lex-letter:first-child { margin-top: 0; padding-top: 0; }
.lex-entry {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 28px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.lex-term {
  font-family: var(--sans);
  font-weight: 500;
  font-size: 14px;
  color: var(--text);
  padding-top: 2px;
}
.lex-def {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.6;
}

/* ─── Account plan tables (annex B) ─── */
.plan-section {
  margin: 24px 0;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.plan-section-head {
  background: var(--bg-card-2);
  padding: 12px 18px;
  display: flex; justify-content: space-between;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent);
  border-bottom: 1px solid var(--border);
}
.plan-row {
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 18px;
  padding: 8px 18px;
  font-family: var(--mono);
  font-size: 12.5px;
  border-bottom: 1px solid var(--border);
}
.plan-row:last-child { border-bottom: none; }
.plan-row.group {
  background: var(--bg-card);
  color: var(--accent);
  font-size: 11.5px;
  letter-spacing: 0.04em;
}
.plan-row.group .pl-no { color: var(--accent); }
.pl-no { color: var(--text-dim); }
.pl-name { color: var(--text); font-family: var(--sans); font-size: 13px; line-height: 1.4; }
.plan-row.group .pl-name { color: var(--accent); font-family: var(--mono); font-size: 11.5px; }

/* ─── Mobile ─── */
@media (max-width: 1100px) {
  .chapter-layout {
    grid-template-columns: 1fr;
    padding: 48px 32px 100px;
  }
  .chapter-main { justify-self: center; max-width: 720px; }
  .chapter-toc { display: none; }
}

@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed; left: 0; top: 0;
    width: 280px;
    z-index: 100;
    transform: translateX(-100%);
    transition: transform .25s;
  }
  .sidebar.open { transform: translateX(0); }
  .content-inner { padding: 64px 24px 100px; }
  .toc { padding: 32px 20px 80px; }
  .cover-card { padding: 28px 22px; }
  .cover-meta { grid-template-columns: 1fr 1fr; gap: 22px; }
  .cover-meta-value { font-size: 30px; }
  .cover-cta { grid-template-columns: 1fr; }
  .cover-cta-btn { width: 100%; }
  .toc-title { font-size: 40px; }
  .chapter-title { font-size: 40px; }
  .chapter-bar { padding: 10px 16px; gap: 12px; }
  .chapter-bar-crumb .crumb-module { display: none; }
  .chapter-bar-crumb .crumb-sep { display: none; }
  .cb-kbd-hints { display: none; }
  .cb-text { display: none; }
  .chapter-layout { padding: 32px 20px 80px; }
  .objectives ol, .compare, .threeup, .fourup, .toc-chapters {
    grid-template-columns: 1fr;
  }
  .compare-divider { display: none; }
  .lex-entry { grid-template-columns: 1fr; gap: 4px; }
}

.menu-toggle {
  display: none;
  position: fixed; top: 16px; right: 16px;
  z-index: 200;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  width: 40px; height: 40px;
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--mono);
}
@media (max-width: 900px) { .menu-toggle { display: block; } }


/* ═══ LOGIN ═══ */
:root{--teal:#00A6D6;--teal-dark:#0088B0;--navy:#0F1923;--white:#ffffff;--grey:#F4F8FB;--border:#DDE8EF;--text:#1A2733;--text2:#5A7080;--red:#FF4757;--green:#1F8A5B}
#fc-login{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--navy)}
#fc-card{background:var(--white);border-radius:24px;padding:48px 40px;width:400px;max-width:92vw;box-shadow:0 8px 40px rgba(0,0,0,.2)}
#fc-logo{text-align:center;margin-bottom:24px}
#fc-logo .fc-brand{display:block;font-family:"DM Serif Display",Georgia,serif;font-size:38px;color:var(--teal);line-height:1.1}
#fc-logo .fc-sub{display:block;font-size:11px;color:var(--text2);letter-spacing:1.8px;text-transform:uppercase;margin-top:6px}
#fc-title{font-size:20px;font-weight:700;color:var(--text);text-align:center;margin-bottom:6px}
#fc-subtitle{font-size:13px;color:var(--text2);text-align:center;margin-bottom:20px;min-height:18px}
.fc-field{margin-bottom:14px}
.fc-field label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.fc-field input{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:10px;font-size:15px;color:var(--text);background:var(--grey);outline:none;box-sizing:border-box;transition:border-color .2s;font-family:inherit}
.fc-field input:focus{border-color:var(--teal);background:var(--white)}
.fc-pwd{position:relative;display:flex;align-items:center}
.fc-pwd input{flex:1;padding-right:76px}
.fc-pwd-btn{position:absolute;right:10px;background:none;border:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);padding:4px;line-height:1}

<template id="tpl-ch01"><header><div class="chapter-meta"><span>Module I · Fondamentaux</span><span class="chapter-meta-divider"></span><span>Chapitre 1</span></div><h1 class="chapter-title"><span class="num">01</span>Les éléments de la comptabilité</h1><p class="chapter-lede">Bilan, compte de résultat, flux de trésorerie, annexe — les quatre piliers des comptes annuels.</p><div class="chapter-stats"><span><span class="dot">●</span> 12 min</span><span><span class="dot">●</span> 6 leçons</span><span><span class="dot">●</span> Fondamental</span></div><div class="objectives"><div class="objectives-label">À l'issue de ce chapitre</div><div class="objectives-title">Vous saurez —</div><ol><li>Identifier les quatre documents de synthèse des comptes annuels</li><li>Distinguer charges et produits, écritures avec/sans incidence sur le résultat</li><li>Reconnaître la structure minimale d'un bilan (art. 959a CO)</li><li>Citer les principales normes comptables reconnues en Suisse</li></ol></div></header><section class="section" id="s-1-1"><div class="section-num"><span>§ 1.1</span></div><h2 class="section-title">Le bilan</h2><p>Le bilan est un document de synthèse qui donne au lecteur une idée juste sur la situation financière d'une entreprise : il indique le patrimoine (les actifs) dont elle dispose, les dettes (fonds étrangers) qu'elle a contractées et son patrimoine net (les fonds propres). Il se décompose en deux parties qui doivent toujours s'équilibrer.</p><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Le bilan est un résumé de l'inventaire</div><div class="keyconcept-body">L'inventaire est un relevé détaillé et complet sur la nature, le nombre et la valeur du patrimoine et des dettes. Le bilan en condense l'image à une date donnée.</div></div><div class="formula"><div class="formula-cap"><span class="formula-label">Équation fondamentale</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">Équilibre permanent du bilan</div><div class="formula-eq">ACTIF = FONDS ÉTRANGERS + FONDS PROPRES</div><div class="formula-legend"><span><b>Actif</b>Patrimoine — emplois</span><span><b>FE</b>Dettes envers des tiers (CT + LT)</span><span><b>FP</b>Fortune nette de l'entité</span></div></div><div class="compare"><div class="compare-side"><div class="head">Actif — Liquidité ↗</div><div class="title">Classement par liquidité</div><ul><li>AC Actif circulant — ≤ 1 an (liquidités, créances, stocks)</li><li>AI Actif immobilisé — &gt; 1 an (machines, immeubles)</li><li class="plain">Critère : vitesse de transformation en cash</li></ul></div><div class="compare-divider">/</div><div class="compare-side"><div class="head">Passif — Exigibilité ↗</div><div class="title">Classement par exigibilité</div><ul><li>CT Fonds étrangers court terme (&lt; 1 an)</li><li>LT Fonds étrangers long terme (&gt; 1 an)</li><li>FP Fonds propres — non exigibles</li><li class="plain">Critère : durée jusqu'au remboursement</li></ul></div></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">La règle d'or du bilan</div><div class="keyconcept-body">Les actifs immobilisés doivent être couverts par des fonds permanents (FE long terme + fonds propres). L'actif circulant peut être couvert par des fonds étrangers à court terme.</div></div><div class="lawarticle"><div class="lawarticle-tag">Art. 959a CO<span class="ref">Code des obligations</span></div><div class="lawarticle-body">Définit la structure minimale du bilan : Actif circulant, Actif immobilisé d'un côté ; Dettes à court terme, Dettes à long terme et Fonds propres de l'autre.</div></div></section><section class="section" id="s-1-2"><div class="section-num"><span>§ 1.2</span></div><h2 class="section-title">Le compte de résultat</h2><p>Le compte de résultat est établi pour une période donnée. Il indique les opérations avec incidence sur le résultat — les charges et les produits — survenues pendant un exercice comptable et met en évidence le résultat (bénéfice ou perte).</p><div class="compare"><div class="compare-side"><div class="head">Charges</div><div class="title">Diminutions de FP</div><ul><li>Chaque franc décaissé (hors acquisition d'actif) réduit les fonds propres</li><li>Existence de charges non monétaires : amortissements, provisions</li></ul></div><div class="compare-divider">↔</div><div class="compare-side"><div class="head">Produits</div><div class="title">Augmentations de FP</div><ul><li>Chaque franc encaissé sur vente augmente les fonds propres</li><li>Produits non monétaires : variation de valeur de titres cotés</li></ul></div></div><h3>Présentation par soldes intermédiaires</h3><div class="dtable"><table><thead><tr><th>Niveau</th><th>Indicateur</th><th>Définition</th></tr></thead><tbody><tr><td>BB</td><td>Bénéfice brut</td><td>Marge brute / Marge contributive 1</td></tr><tr><td>EBITDA</td><td>Excédent brut</td><td>Avant intérêts, taxes &amp; amortissements</td></tr><tr><td>EBIT</td><td>Excédent brut</td><td>Avant intérêts &amp; taxes</td></tr><tr><td>EBT</td><td>Excédent brut</td><td>Avant taxes</td></tr><tr><td>RN</td><td>Résultat net</td><td>Bénéfice ou perte de l'exercice</td></tr></tbody></table></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Pourquoi ces niveaux ?</div><div class="keyconcept-body">Ils permettent de mesurer le résultat d'exploitation sans tenir compte des différents taux d'amortissements, des taux liés au financement et ceux relevant du système fiscal — la comparabilité est ainsi améliorée.</div></div><h3>Écritures avec incidence sur le résultat</h3><div class="dtable"><table><thead><tr><th>Débit</th><th>Crédit</th><th>Incidence</th></tr></thead><tbody><tr><td>Compte de bilan</td><td>Compte de bilan</td><td>Aucune</td></tr><tr><td>Compte de gestion</td><td>Compte de bilan</td><td>Négative sur le résultat</td></tr><tr><td>Compte de bilan</td><td>Compte de gestion</td><td>Positive sur le résultat</td></tr><tr><td>Compte de gestion</td><td>Compte de gestion</td><td>Aucune</td></tr></tbody></table></div><div class="lawarticle"><div class="lawarticle-tag">Art. 959b CO<span class="ref">Code des obligations</span></div><div class="lawarticle-body">Le compte de résultat peut être établi selon la méthode de l'affectation des charges par nature ou selon celle de l'affectation des charges par fonction.</div></div></section><section class="section" id="s-1-3"><div class="section-num"><span>§ 1.3</span></div><h2 class="section-title">Le tableau de flux de trésorerie</h2><p>La liquidité et la rentabilité sont deux objectifs financiers prépondérants de toute entreprise. L'illiquidité (insolvabilité) compromet son existence à court terme ; la non-rentabilité rend impossible la poursuite de l'activité.</p><p class="muted">Le tableau de flux de trésorerie indique la variation de la trésorerie pendant un exercice et renseigne sur la provenance et l'utilisation des moyens financiers.</p><div class="threeup"><div class="threeup-card"><div class="pre">Flux I</div><div class="ttl">Exploitation</div><div class="sub">Activité courante</div></div><div class="threeup-card"><div class="pre">Flux II</div><div class="ttl">Investissement</div><div class="sub">Acquisitions / cessions</div></div><div class="threeup-card"><div class="pre">Flux III</div><div class="ttl">Financement</div><div class="sub">Fonds propres / dettes</div></div></div></section><section class="section" id="s-1-4"><div class="section-num"><span>§ 1.4</span></div><h2 class="section-title">L'annexe aux comptes</h2><p>Toutes les entreprises — à l'exception des entreprises individuelles et des sociétés de personnes — doivent établir une annexe qui complète et explique les autres éléments des comptes annuels.</p><h3>Informations prescrites par la loi</h3><ul class="bullets"><li>Raison de commerce, forme juridique, siège, nombre de collaborateurs</li><li>Participations avec part du capital et part des droits de vote</li><li>Propres parts du capital — acquisition / aliénation</li><li>Valeur résiduelle des dettes de crédit-bail (&gt; 12 mois)</li><li>Dettes envers les institutions de prévoyance</li><li>Sûretés constituées en faveur de tiers</li><li>Engagements conditionnels</li><li>Événements importants survenus après la date du bilan</li></ul><div class="callout note"><div class="callout-label">Art. 961a</div><div>Pour les grandes entreprises uniquement : honoraires versés à l'organe de révision et informations sur les obligations foncières.</div></div><div class="lawarticle"><div class="lawarticle-tag">Art. 959c CO<span class="ref">Code des obligations</span></div><div class="lawarticle-body">L'annexe contient au minimum : les principes comptables appliqués, des informations sur certains postes du bilan et du compte de résultat, le montant global d'une éventuelle dissolution nette des réserves latentes.</div></div></section><section class="section" id="s-1-5"><div class="section-num"><span>§ 1.5</span></div><h2 class="section-title">L'exercice comptable</h2><p>Un exercice comptable s'étend en général sur une période de 12 mois — sa durée peut être plus courte ou plus longue, notamment durant la première et la dernière année d'activité.</p><div class="dtable"><table><thead><tr><th>Phase</th><th>Opérations</th></tr></thead><tbody><tr><td>Ouverture</td><td>Report des soldes à nouveau, extourne des comptes de régularisation</td></tr><tr><td>Enregistrement</td><td>Transactions courantes durant l'exercice</td></tr><tr><td>Clôture</td><td>Écritures de bouclement : régularisation, provisions, amortissements, réserves latentes</td></tr></tbody></table></div></section><section class="section" id="s-1-6"><div class="section-num"><span>§ 1.6</span></div><h2 class="section-title">Les normes comptables</h2><p>Le Code des obligations (CO) est un cadre légal qui impose les obligations de base et la structure minimale des comptes en Suisse. Une norme comptable reconnue (Swiss GAAP, IFRS, US GAAP) est un ensemble de règles détaillées pour la présentation des états financiers.</p><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Quand une norme reconnue est-elle obligatoire ?</div><div class="keyconcept-body"><strong>Art. 962 CO</strong> — notamment : sociétés cotées en bourse si la bourse l'exige ; associés représentant ≥ 20 % du capital ; tout associé qui répond personnellement des dettes.</div></div><h3>Normes reconnues par le Conseil fédéral</h3><ul class="bullets"><li>Swiss GAAP RPC — Recommandations relatives à la Présentation des Comptes</li><li>IFRS for SMEs — Standard international pour PME</li><li>IFRS — International Financial Reporting Standards</li><li>US GAAP — United States Generally Accepted Accounting Principles</li><li>IPSAS — International Public Sector Accounting Standards</li></ul></section></template>
<template id="tpl-ch02"><header><div class="chapter-meta"><span>Module II · Bouclement</span><span class="chapter-meta-divider"></span><span>Chapitre 2</span></div><h1 class="chapter-title"><span class="num">02</span>Les opérations de régularisation</h1><p class="chapter-lede">Rattacher à chaque exercice les charges consommées et les produits acquis — pas un de plus, pas un de moins.</p><div class="chapter-stats"><span><span class="dot">●</span> 18 min</span><span><span class="dot">●</span> 5 leçons</span><span><span class="dot">●</span> Intermédiaire</span></div><div class="objectives"><div class="objectives-label">À l'issue de ce chapitre</div><div class="objectives-title">Vous saurez —</div><ol><li>Distinguer les 4 cas de régularisation (charges/produits, avance/à payer)</li><li>Comptabiliser une charge payée d'avance avec extourne en N+1</li><li>Comptabiliser une charge à payer (passif transitoire)</li><li>Identifier l'effet d'un produit constaté d'avance sur le résultat</li></ol></div></header><section class="section" id="s-2-1"><div class="section-num"><span>§ 2.1</span></div><h2 class="section-title">Généralités &amp; cas de régularisation</h2><p>Lorsqu'arrive la fin de l'année, l'entreprise doit procéder à la régularisation de ses charges et de ses produits. Le principe : rattacher à l'exercice toutes les charges consommées et tous les produits acquis, en virant le reste en actifs ou passifs de régularisation.</p><div class="compare"><div class="compare-side"><div class="head">Actifs de régularisation</div><div class="title">Compte 1300 / 1301</div><ul><li>1300 Charges payées d'avance</li><li>1301 Produits à recevoir</li><li class="plain">Effet : augmentation de l'actif</li></ul></div><div class="compare-divider">↔</div><div class="compare-side"><div class="head">Passifs de régularisation</div><div class="title">Compte 2300 / 2301</div><ul><li>2300 Charges à payer</li><li>2301 Produits reçus d'avance</li><li class="plain">Effet : augmentation du passif</li></ul></div></div><div class="callout note"><div class="callout-label">Vocabulaire</div><div>Dans le langage comptable, on utilise aussi le terme « transitoire » (ancienne terminologie). Actifs transitoires = actifs de régularisation.</div></div></section><section class="section" id="s-2-2"><div class="section-num"><span>§ 2.2</span><span class="tag">Actif de régul.</span></div><h2 class="section-title">Charges payées d'avance</h2><p>Charges payées au cours de l'exercice mais correspondant à des achats de biens et de services dont la fourniture interviendra ultérieurement. À ce titre, l'entreprise dispose d'une créance en nature. Classique : loyers, primes d'assurance, abonnements.</p><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Calcul de la quote-part</div><div class="keyconcept-body">Quand une charge couvre une période à cheval sur deux exercices, on répartit prorata temporis : <strong>ChargeN = Total × moisN / total_mois</strong>.</div></div><h3>Cas : prime d'assurance RC — 12'000 CHF du 1.10.N au 30.09.N+1</h3><div class="threeup"><div class="threeup-card"><div class="pre">Total prime</div><div class="ttl">12 000.−</div><div class="sub">12 mois</div></div><div class="threeup-card"><div class="pre">Part N</div><div class="ttl">3 000.−</div><div class="sub">Oct → Déc · 3/12</div></div><div class="threeup-card"><div class="pre">Part N+1</div><div class="ttl">9 000.−</div><div class="sub">Jan → Sept · 9/12</div></div></div><div class="journal"><div class="journal-cap"><strong>1. Paiement initial</strong><span>1ᵉʳ octobre N</span></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">6310 Assurance RC</td><td class="acct">1020 Banque</td><td class="amount">12 000.00</td><td class="comment">Prime annuelle RC</td></tr></tbody></table></div><div class="journal"><div class="journal-cap"><strong>2. Régularisation au bouclement</strong><span>31.12.N</span></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">1300 Actif de régul.</td><td class="acct">6310 Assurance RC</td><td class="amount">9 000.00</td><td class="comment">Prime ass. RC / Janv→Sept N+1</td></tr></tbody></table></div><div class="journal"><div class="journal-cap"><strong>3. Extourne à l'ouverture</strong><span>1.1.N+1</span></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">6310 Assurance RC</td><td class="acct">1300 Actif de régul.</td><td class="amount">9 000.00</td><td class="comment">Extourne prime ass. RC</td></tr></tbody></table></div></section><section class="section" id="s-2-3"><div class="section-num"><span>§ 2.3</span><span class="tag">Passif de régul.</span></div><h2 class="section-title">Charges à payer</h2><p>Raisonnement inverse : la charge a été consommée durant l'année mais la facture n'est pas encore parvenue au service comptable. Classique : électricité, téléphone, intérêts courus, campagnes publicitaires.</p><h3>Cas : intérêts courus sur emprunt — 250'000 CHF à 6 %, échéances 31.3 et 30.9</h3><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Intérêts courus du 1.10.N au 31.12.N</div><div class="keyconcept-body">250 000 × 6 % × 3/12 = <strong>3'750 CHF</strong> à provisionner au bouclement.</div></div><div class="journal"><div class="journal-cap"><strong>Régularisation au 31.12.N</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">6900 Intérêts-charges</td><td class="acct">2300 Passif de régul.</td><td class="amount">3 750.00</td><td class="comment">Intérêts courus / dette bancaire</td></tr></tbody></table></div><div class="journal"><div class="journal-cap"><strong>Extourne au 1.1.N+1</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">2300 Passif de régul.</td><td class="acct">6900 Intérêts-charges</td><td class="amount">3 750.00</td><td class="comment">Extourne intérêts courus</td></tr></tbody></table></div></section><section class="section" id="s-2-4"><div class="section-num"><span>§ 2.4</span><span class="tag">Passif de régul.</span></div><h2 class="section-title">Produits constatés d'avance</h2><p>Produits enregistrés au cours de l'exercice avant que les prestations soient effectuées. L'entreprise devra s'acquitter d'une dette en nature. Cas type : abonnements vendus, loyers encaissés d'avance.</p><h3>Cas : loyer encaissé 12'000 CHF pour 12 mois à cheval</h3><div class="journal"><div class="journal-cap"><strong>Régularisation au 31.12.N</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">7502 Produits immeuble</td><td class="acct">2301 Passif de régul.</td><td class="amount">9 000.00</td><td class="comment">Loyers N+1 encaissés</td></tr></tbody></table></div><div class="journal"><div class="journal-cap"><strong>Extourne au 1.1.N+1</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">2301 Passif de régul.</td><td class="acct">7502 Produits immeuble</td><td class="amount">9 000.00</td><td class="comment">Loyers N+1 encaissables</td></tr></tbody></table></div></section><section class="section" id="s-2-5"><div class="section-num"><span>§ 2.5</span><span class="tag">Actif de régul.</span></div><h2 class="section-title">Produits à recevoir</h2><p>Produits acquis par l'entreprise mais dont le montant n'a pas encore été comptabilisé. Cas type : ristournes fournisseurs estimées, intérêts courus sur prêts accordés.</p><h3>Cas : ristourne fournisseur estimée à 12'000 CHF</h3><div class="journal"><div class="journal-cap"><strong>Régularisation au 31.12.N</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">1301 Actif de régul.</td><td class="acct">4292 Ristourne à recevoir</td><td class="amount">12 000.00</td><td class="comment">Ristournes à recevoir</td></tr></tbody></table></div></section></template>
<template id="tpl-ch03"><header><div class="chapter-meta"><span>Module II · Bouclement</span><span class="chapter-meta-divider"></span><span>Chapitre 3</span></div><h1 class="chapter-title"><span class="num">03</span>Provisions &amp; réserves latentes</h1><p class="chapter-lede">Anticiper l'incertitude — le principe de prudence appliqué au bilan.</p><div class="chapter-stats"><span><span class="dot">●</span> 20 min</span><span><span class="dot">●</span> 4 leçons</span><span><span class="dot">●</span> Intermédiaire</span></div><div class="objectives"><div class="objectives-label">À l'issue de ce chapitre</div><div class="objectives-title">Vous saurez —</div><ol><li>Distinguer provision et compte de régularisation</li><li>Comptabiliser la création, l'utilisation et la dissolution d'une provision</li><li>Constituer un ducroire sur créances clients (taux fiscaux admis)</li><li>Identifier la nature d'une réserve latente et son traitement comptable</li></ol></div></header><section class="section" id="s-3-1"><div class="section-num"><span>§ 3.1</span></div><h2 class="section-title">Les provisions</h2><p>Une provision est un moyen de corriger la valeur des actifs au bilan (ex : remise en état d'immobilisations) ou de tenir compte d'obligations futures dont le montant et l'échéance ne peuvent qu'être estimés au moment du bouclement.</p><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Régularisation vs. provision</div><div class="keyconcept-body"><strong>Régularisation</strong> = principe acquis, montant quasi-certain.&nbsp;<strong>Provision</strong> = principe probable, montant estimé. C'est la différence centrale.</div></div><div class="compare"><div class="compare-side"><div class="head">CT — Court terme</div><div class="title">Échéance ≤ 12 mois</div><ul><li class="plain">2330 Provisions à court terme</li></ul></div><div class="compare-divider">≷</div><div class="compare-side"><div class="head">LT — Long terme</div><div class="title">Échéance ≥ 12 mois</div><ul><li class="plain">2600 Provisions à long terme</li><li class="plain">2650 Provisions pour réparation</li></ul></div></div><div class="lawarticle"><div class="lawarticle-tag">Art. 960e CO<span class="ref">Code des obligations</span></div><div class="lawarticle-body">Lorsqu'en raison d'événements passés, il faut s'attendre à une perte d'avantages économiques lors d'exercices futurs, il y a lieu de constituer des provisions à charge du compte de résultat, à hauteur du montant vraisemblablement nécessaire.</div></div></section><section class="section" id="s-3-2"><div class="section-num"><span>§ 3.2</span></div><h2 class="section-title">Cycle de vie d'une provision</h2><p>Une provision suit trois moments : sa création (charge), son utilisation (la dette se réalise) et sa dissolution (si elle ne se justifie plus).</p><div class="journal"><div class="journal-cap"><strong>Création — provision de 70'000 pour réparation immeuble</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">7511 Charges immeuble</td><td class="acct">2650 Provision LT</td><td class="amount">70 000.00</td><td class="comment">Provision sur réparation immeuble</td></tr></tbody></table></div><div class="journal"><div class="journal-cap"><strong>Utilisation — la réparation coûte 50'000 CHF</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">2650 Provision LT</td><td class="acct">1020 Banque</td><td class="amount">50 000.00</td><td class="comment">Paiement réparation immeuble</td></tr></tbody></table></div><div class="journal"><div class="journal-cap"><strong>Dissolution du solde — 20'000 CHF non utilisés</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">2650 Provision LT</td><td class="acct">8511 Diss. excep. de prov.</td><td class="amount">20 000.00</td><td class="comment">Dissolution solde provision</td></tr></tbody></table></div><div class="callout fiscal"><div class="callout-label">Fiscal</div><div>Si le CO autorise le maintien d'une provision non justifiée, la LIFD (art. 63 al. 2) l'ajoute au bénéfice imposable. Maintenir = constituer une réserve latente.</div></div></section><section class="section" id="s-3-3"><div class="section-num"><span>§ 3.3</span></div><h2 class="section-title">Pertes sur créances — le ducroire</h2><p>Compte tenu du doute pouvant exister sur la possibilité d'encaisser des créances clients, une gestion prudente implique la constitution d'une provision pour pertes sur créances — appelée <strong>ducroire</strong> (compte 1109).</p><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Convention de numérotation</div><div class="keyconcept-body">Le compte de provisions pour pertes sur créances se termine toujours par un 9 : <strong>1109, 1119, 1129</strong>. Il vient en déduction du compte créance correspondant (poste correcteur de l'actif).</div></div><h3>Taux fiscaux admis sans justificatif</h3><div class="dtable"><table><thead><tr><th>Type de créances</th><th class="right">Taux admis</th></tr></thead><tbody><tr><td>Créances clients suisses</td><td class="right">5 %</td></tr><tr><td>Créances clients étrangers</td><td class="right">10 %</td></tr><tr><td>Créances en devises étrangères</td><td class="right">Variable selon risque</td></tr></tbody></table></div><h3>Cas : créances de 200'000 CHF — ducroire de 5 %</h3><div class="journal"><div class="journal-cap"><strong>Constitution du ducroire</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">3095 Pertes sur débiteurs</td><td class="acct">1109 Ducroire</td><td class="amount">10 000.00</td><td class="comment">Provision 5 % / créances CH</td></tr></tbody></table></div><div class="journal"><div class="journal-cap"><strong>Perte définitive sur un débiteur (15'000)</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">1109 Ducroire</td><td class="acct">1100 Créances clients</td><td class="amount">10 000.00</td><td class="comment">Imputation sur ducroire</td></tr><tr><td class="acct">3095 Pertes sur déb.</td><td class="acct">1100 Créances clients</td><td class="amount">5 000.00</td><td class="comment">Surplus à charge du résultat</td></tr></tbody></table></div></section><section class="section" id="s-3-4"><div class="section-num"><span>§ 3.4</span></div><h2 class="section-title">Les réserves latentes</h2><p>Une <strong>réserve latente</strong> est une partie des fonds propres qui n'apparaît pas explicitement au bilan. Elle résulte d'une sous-évaluation d'actif ou d'une surévaluation de passif.</p><div class="compare"><div class="compare-side"><div class="head">Sous-évaluation</div><div class="title">Réserves d'estimation</div><ul><li>Amortissement plus rapide que l'usure</li><li>Ducroire dépassant les pertes effectives</li><li>Évaluation de stocks au plus bas</li></ul></div><div class="compare-divider">+</div><div class="compare-side"><div class="head">Sur-évaluation</div><div class="title">Réserves dissimulées</div><ul><li>Provisions surdimensionnées</li><li>Maintien de provisions non justifiées</li></ul></div></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Pourquoi des réserves latentes ?</div><div class="keyconcept-body">Lissage du résultat, prudence économique, optimisation fiscale. Les normes reconnues (Swiss GAAP RPC, IFRS) les interdisent dans un souci de transparence économique.</div></div><div class="lawarticle"><div class="lawarticle-tag">Art. 959c al. 1 ch. 3 CO<span class="ref">Code des obligations</span></div><div class="lawarticle-body">L'annexe doit indiquer le montant global provenant d'une éventuelle dissolution nette des réserves latentes — un compromis suisse entre prudence et transparence.</div></div></section></template>
<template id="tpl-ch04"><header><div class="chapter-meta"><span>Module II · Bouclement</span><span class="chapter-meta-divider"></span><span>Chapitre 4</span></div><h1 class="chapter-title"><span class="num">04</span>Les amortissements</h1><p class="chapter-lede">Étaler dans le temps la perte de valeur des actifs immobilisés — usure, âge, obsolescence.</p><div class="chapter-stats"><span><span class="dot">●</span> 15 min</span><span><span class="dot">●</span> 5 leçons</span><span><span class="dot">●</span> Intermédiaire</span></div><div class="objectives"><div class="objectives-label">À l'issue de ce chapitre</div><div class="objectives-title">Vous saurez —</div><ol><li>Distinguer amortissement financier, amortissement de créance et amortissement comptable</li><li>Appliquer les taux fiscaux admis pour meubles et immeubles</li><li>Comptabiliser un amortissement direct ou indirect</li><li>Traiter la vente d'une immobilisation amortie (plus / moins-value)</li></ol></div></header><section class="section" id="s-4-1"><div class="section-num"><span>§ 4.1</span></div><h2 class="section-title">Principe &amp; cadre légal</h2><p>L'amortissement comptable consiste à diminuer la valeur d'un actif immobilisé. Il traduit la perte de valeur due à l'usure, à l'âge ou à l'obsolescence — c'est une charge non monétaire.</p><div class="compare"><div class="compare-side"><div class="head">Linéaire</div><div class="title">Charge constante</div><ul><li>Répartition uniforme sur la durée d'utilisation</li><li></li><li>Taux = moitié du taux dégressif</li></ul></div><div class="compare-divider">↔</div><div class="compare-side"><div class="head">Dégressif</div><div class="title">Charge décroissante</div><ul><li>Amortissements importants en début de vie</li><li></li><li>Plus fréquent en pratique suisse</li></ul></div></div><div class="lawarticle"><div class="lawarticle-tag">Art. 960a CO<span class="ref">Code des obligations</span></div><div class="lawarticle-body">Lors de sa première comptabilisation, un actif est évalué au plus à son coût d'acquisition ou à son coût de revient. Les pertes de valeur dues à l'utilisation et au facteur temps sont comptabilisées par le biais des amortissements ; leur comptabilisation au passif est prohibée.</div></div><div class="callout attention"><div class="callout-label">Important</div><div>Les amortissements comptables sont des <strong>charges non monétaires</strong> — ils diminuent le résultat sans sortie de trésorerie.</div></div></section><section class="section" id="s-4-2"><div class="section-num"><span>§ 4.2</span></div><h2 class="section-title">Taux fiscaux admis</h2><p>L'Administration fédérale des contributions publie une <strong>Notice A</strong> qui fixe les taux d'amortissement dégressifs admis sans justificatif. Pour un amortissement linéaire, ces taux sont réduits de moitié et calculés sur le coût d'acquisition.</p><h3>Immobilisations corporelles meubles</h3><div class="dtable"><table><thead><tr><th>Catégorie</th><th class="right">Taux dégressif</th></tr></thead><tbody><tr><td>Machines &amp; appareils de production</td><td class="right accent">30 %</td></tr><tr><td>Mobilier et installations</td><td class="right accent">25 %</td></tr><tr><td>Machines de bureau</td><td class="right accent">40 %</td></tr><tr><td>Infrastructures informatiques, communications</td><td class="right accent">40 %</td></tr><tr><td>Véhicules</td><td class="right accent">40 %</td></tr><tr><td>Instruments et outillage</td><td class="right accent">45 %</td></tr><tr><td>Installations de stockage (meubles)</td><td class="right accent">25 %</td></tr><tr><td>Entrepôts à hauts rayonnages</td><td class="right accent">15 %</td></tr></tbody></table></div><h3>Immobilisations corporelles immeubles</h3><div class="dtable"><table><thead><tr><th>Type</th><th class="right">Bâtiment</th><th class="right">Bâtiment + terrain</th></tr></thead><tbody><tr><td>Bâtiments d'habitation (placement)</td><td class="right accent">2 %</td><td class="right accent">1.5 %</td></tr><tr><td>Bâtiments commerciaux non urbains</td><td class="right accent">4 %</td><td class="right accent">3 %</td></tr><tr><td>Hôtels et restaurants</td><td class="right accent">6 %</td><td class="right accent">4 %</td></tr><tr><td>Bâtiments industriels &amp; artisanaux</td><td class="right accent">8 %</td><td class="right accent">7 %</td></tr></tbody></table></div><div class="callout note"><div class="callout-label">Terrain</div><div>L'administration fiscale n'admet en principe pas d'amortissement sur la valeur des bien-fonds (terrains).</div></div></section><section class="section" id="s-4-3"><div class="section-num"><span>§ 4.3</span><span class="tag">Exemple guidé</span></div><h2 class="section-title">Comparaison linéaire vs. dégressif</h2><p>Infrastructure informatique acquise à 100'000 CHF, taux dégressif 40 % / taux linéaire 20 %.</p><div class="dtable"><div class="dtable-cap">Amortissement linéaire 20 % — base fixe</div><table><thead><tr><th>Année · base</th><th class="right">Amortissement</th></tr></thead><tbody><tr><td>Année 1 · 100'000</td><td class="right accent">20 000.−</td></tr><tr><td>Année 2 · 80'000</td><td class="right accent">20 000.−</td></tr><tr><td>Année 3 · 60'000</td><td class="right accent">20 000.−</td></tr><tr><td>Année 4 · 40'000</td><td class="right accent">20 000.−</td></tr><tr><td>Année 5 · 20'000</td><td class="right accent">20 000.−</td></tr><tr class="total"><td>Total amorti</td><td class="right accent">100 000.−</td></tr></tbody></table></div><div class="dtable"><div class="dtable-cap">Amortissement dégressif 40 % — valeur résiduelle</div><table><thead><tr><th>Année · valeur résid.</th><th class="right">Amortissement</th></tr></thead><tbody><tr><td>Année 1 · 100'000</td><td class="right accent">40 000.−</td></tr><tr><td>Année 2 · 60'000</td><td class="right accent">24 000.−</td></tr><tr><td>Année 3 · 36'000</td><td class="right accent">14 400.−</td></tr><tr><td>Année 4 · 21'600</td><td class="right accent">10 800.−</td></tr><tr><td>Année 5 · 10'800</td><td class="right accent">10 800.−</td></tr><tr class="total"><td>Total amorti</td><td class="right accent">100 000.−</td></tr></tbody></table></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Bien amorti à 1 CHF « pour mémoire »</div><div class="keyconcept-body">Lorsque la valeur résiduelle devient faible, le solde peut être amorti en un exercice. Si le bien n'est ni vendu ni éliminé, il figure au bilan à <strong>1 CHF pour mémoire</strong>.</div></div></section><section class="section" id="s-4-4"><div class="section-num"><span>§ 4.4</span></div><h2 class="section-title">Méthodes : direct vs. indirect</h2><div class="compare"><div class="compare-side"><div class="head">Direct</div><div class="title">Diminution directe de l'actif</div><ul><li>L'amortissement est porté directement sur le compte d'immobilisation</li><li>Solde = valeur comptable nette</li><li></li></ul></div><div class="compare-divider">≷</div><div class="compare-side"><div class="head">Indirect</div><div class="title">Compte correctif ACV</div><ul><li>Compte d'immo conservé à la valeur d'acquisition</li><li>Compte cumul amortissement (finit par 9)</li><li></li></ul></div></div><h3>Cas : amortissement direct — machine 100'000 CHF à 40 %</h3><div class="journal"><div class="journal-cap"><strong>Amortissement de l'exercice</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">6820 Amortissement</td><td class="acct">1500 Machines</td><td class="amount">40 000.00</td><td class="comment">Amort. immo. corporelle direct</td></tr></tbody></table></div><h3>Cas : amortissement indirect — même machine</h3><div class="journal"><div class="journal-cap"><strong>Amortissement de l'exercice</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">6820 Amortissement</td><td class="acct">1509 ACV machines</td><td class="amount">40 000.00</td><td class="comment">Amort. immo. corp. indirect</td></tr></tbody></table></div><div class="callout note"><div class="callout-label">Convention</div><div>Le compte cumul d'amortissement se termine toujours par 9 : 1509 pour les machines, 1519, 1529… Ce sont des comptes actifs négatifs.</div></div></section><section class="section" id="s-4-5"><div class="section-num"><span>§ 4.5</span></div><h2 class="section-title">Vente d'une immobilisation amortie</h2><p>À la cession, le compte d'immobilisation correspond à la valeur comptable résiduelle nette du bien vendu. Si le prix de vente dépasse cette valeur, on enregistre un produit exceptionnel (plus-value). À l'inverse, un produit inférieur génère une moins-value.</p><h3>Cas : machine VCN 60'000 vendue 63'500 CHF</h3><div class="journal"><div class="journal-cap"><strong>Cession au prix de la VCN</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">1020 Banque</td><td class="acct">1500 Machines</td><td class="amount">60 000.00</td><td class="comment">Vente immobilisation (valeur comptable)</td></tr></tbody></table></div><div class="journal"><div class="journal-cap"><strong>Constatation de la plus-value</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">1020 Banque</td><td class="acct">8510 Produit exceptionnel</td><td class="amount">3 500.00</td><td class="comment">Plus-value sur vente immobilisation</td></tr></tbody></table></div></section></template>
<template id="tpl-ch05"><header><div class="chapter-meta"><span>Module III · Salaires</span><span class="chapter-meta-divider"></span><span>Chapitre 5</span></div><h1 class="chapter-title"><span class="num">05</span>Le personnel</h1><p class="chapter-lede">Le salaire, les assurances sociales et la mécanique des trois piliers suisses.</p><div class="chapter-stats"><span><span class="dot">●</span> 24 min</span><span><span class="dot">●</span> 5 leçons</span><span><span class="dot">●</span> Avancé</span></div><div class="objectives"><div class="objectives-label">À l'issue de ce chapitre</div><div class="objectives-title">Vous saurez —</div><ol><li>Identifier les différentes formes de salaire reconnues par le CO</li><li>Calculer les cotisations AVS/AI/APG/AC sur un salaire déterminant</li><li>Comprendre la mécanique LPP : salaire coordonné et déduction de coordination</li><li>Distinguer statut salarié et statut indépendant (critères AVS)</li></ol></div></header><section class="section" id="s-5-1"><div class="section-num"><span>§ 5.1</span></div><h2 class="section-title">Les formes de salaire</h2><p>Le droit fédéral suisse ne définit pas de salaire minimal — le montant est convenu entre employeur et travailleur. Quelques cantons (Genève, Jura, Neuchâtel) ont mis en place un minimum, ainsi que certaines conventions collectives.</p><div class="dtable"><table><thead><tr><th>Forme</th><th>Base légale</th><th>Principe</th></tr></thead><tbody><tr><td>Salaire fixe</td><td class="dim">—</td><td>Rémunération en fonction du temps consacré</td></tr><tr><td>Salaire horaire</td><td class="dim">—</td><td>Souplesse en cas de fluctuation</td></tr><tr><td>Heures supplémentaires</td><td class="dim">CO 321c</td><td>Travail au-delà du contrat</td></tr><tr><td>Salaire à la pièce</td><td class="dim">CO 326</td><td>Quantité concrètement fournie</td></tr><tr><td>Salaire variable</td><td class="dim">CO 322a</td><td>Participation au bénéfice / CA</td></tr><tr><td>Commissions</td><td class="dim">CO 322b</td><td>Performances de vente</td></tr><tr><td>Gratifications</td><td class="dim">CO 322d</td><td>Récompense, accessoire au salaire</td></tr></tbody></table></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Le 13ᵉ salaire</div><div class="keyconcept-body">Sur le plan fédéral, le 13ᵉ salaire <strong>n'est pas obligatoire</strong>. Il dépend d'une convention collective, d'un contrat-type ou d'un accord individuel.</div></div><div class="callout note"><div class="callout-label">Voiture de fonction</div><div>Part privée : 10.8 % par an (0.9 % par mois) calculée sur le prix d'achat HT du véhicule. Minimum 1'800 CHF/an (RAVS art. 13).</div></div></section><section class="section" id="s-5-2"><div class="section-num"><span>§ 5.2</span></div><h2 class="section-title">Les trois piliers — vue d'ensemble</h2><p>Le système suisse de prévoyance s'organise en trois piliers, chacun avec une finalité distincte : étatique, professionnel, individuel.</p><div class="threeup"><div class="threeup-card"><div class="pre">1ᵉʳ pilier</div><div class="ttl">Étatique</div><div class="sub">AVS / AI / APG / AC</div></div><div class="threeup-card"><div class="pre">2ᵉ pilier</div><div class="ttl">Professionnel</div><div class="sub">LPP / LAA</div></div><div class="threeup-card"><div class="pre">3ᵉ pilier</div><div class="ttl">Individuel</div><div class="sub">Prévoyance privée</div></div></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Logique des trois piliers</div><div class="keyconcept-body">Le 1ᵉʳ pilier couvre le minimum vital (répartition). Le 2ᵉ pilier maintient le niveau de vie habituel (capitalisation). Le 3ᵉ pilier comble les lacunes éventuelles (épargne libre).</div></div></section><section class="section" id="s-5-3"><div class="section-num"><span>§ 5.3</span></div><h2 class="section-title">1ᵉʳ pilier — AVS/AI/APG/AC</h2><p>L'AVS/AI/APG sont des assurances obligatoires financées par les cotisations employeurs, salariés et indépendants. L'AC ne concerne pas les indépendants. L'employeur participe pour moitié au paiement et calcule sur le <strong>salaire déterminant AVS</strong>.</p><div class="dtable"><div class="dtable-cap">Taux 2025</div><table><thead><tr><th>Cotisation</th><th class="right">Salarié</th><th class="right">Employeur</th><th class="right">Indépendant</th></tr></thead><tbody><tr><td>AVS</td><td class="right accent">4.35 %</td><td class="right accent">4.35 %</td><td class="right accent">8.10 %</td></tr><tr><td>AI</td><td class="right accent">0.70 %</td><td class="right accent">0.70 %</td><td class="right accent">1.40 %</td></tr><tr><td>APG</td><td class="right accent">0.25 %</td><td class="right accent">0.25 %</td><td class="right accent">0.50 %</td></tr><tr class="total"><td>Sous-total AVS/AI/APG</td><td class="right accent">5.30 %</td><td class="right accent">5.30 %</td><td class="right accent">10.00 %</td></tr><tr><td>AC (jusqu'à 148'200)</td><td class="right accent">1.10 %</td><td class="right accent">1.10 %</td><td class="right accent">—</td></tr><tr class="total"><td>TOTAL</td><td class="right accent">6.40 %</td><td class="right accent">6.40 %</td><td class="right accent">10.00 %</td></tr></tbody></table></div><div class="callout note"><div class="callout-label">Seuils</div><div>Salaires &lt; 2'500 CHF/an : cotisations AVS uniquement sur demande de l'employé. Rentiers (&gt; 65 ans) : franchise de 1'400 CHF/mois ou 16'800 CHF/an par employeur.</div></div></section><section class="section" id="s-5-4"><div class="section-num"><span>§ 5.4</span></div><h2 class="section-title">2ᵉ pilier — LPP (salaire coordonné)</h2><p>La LPP est obligatoire pour les salariés (facultative pour indépendants). Pour cotiser, il faut être assuré à l'AVS, avoir plus de 17 ans, et toucher le salaire minimum déterminant LPP.</p><div class="dtable"><table><thead><tr><th>Libellé</th><th class="right">Montant 2025</th><th>Référence</th></tr></thead><tbody><tr><td>Base de calcul (rente AVS max)</td><td class="right accent">30 240.00</td><td class="dim">1 × rente AVS max</td></tr><tr><td>Limite supérieure LPP</td><td class="right accent">90 720.00</td><td class="dim">3 × rente AVS max</td></tr><tr><td>Déduction de coordination</td><td class="right accent">−26 460.00</td><td class="dim">7/8 rente AVS max</td></tr><tr><td>Salaire coordonné LPP max.</td><td class="right accent">64 260.00</td><td class="dim">—</td></tr><tr><td>Seuil d'entrée (3/4)</td><td class="right accent">22 680.00</td><td class="dim">—</td></tr><tr><td>Salaire coordonné LPP min.</td><td class="right accent">3 780.00</td><td class="dim">—</td></tr></tbody></table></div><div class="formula"><div class="formula-cap"><span class="formula-label">LPP — salaire coordonné</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">Calcul du salaire LPP</div><div class="formula-eq">Sal. coord. = Sal. AVS − Déduction de coordination</div><div class="formula-legend"><span><b>Déduction</b>7/8 rente AVS max — 26'460 CHF (2025)</span><span><b>Plafond</b>3 × rente AVS max — 90'720 CHF (2025)</span></div></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Exemple</div><div class="keyconcept-body">Salaire annuel AVS de 90'000 CHF − déduction de coordination de 26'460 CHF = <strong>salaire coordonné de 63'540 CHF</strong> sur lequel s'applique le taux LPP.</div></div><div class="callout note"><div class="callout-label">Temps partiel</div><div>Pour une activité à temps partiel, le montant de coordination est souvent réduit en proportion du degré d'activité par les caisses de pension.</div></div></section><section class="section" id="s-5-5"><div class="section-num"><span>§ 5.5</span></div><h2 class="section-title">Salarié ou indépendant ?</h2><p>La distinction relève du droit AVS et conditionne la qualification fiscale, sociale et le mode de cotisation. Plusieurs critères s'apprécient glo
