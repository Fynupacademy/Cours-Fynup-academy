balement.</p><div class="compare"><div class="compare-side"><div class="head">Salarié</div><div class="title">Dépendance économique</div><ul><li>Rapport de subordination</li><li>Pas d'investissement propre</li><li>Pas de risque d'entreprise</li><li>Client unique ou principal</li></ul></div><div class="compare-divider">vs</div><div class="compare-side"><div class="head">Indépendant</div><div class="title">Activité pour propre compte</div><ul><li>Investissements &amp; locaux propres</li><li>Risque économique assumé</li><li>Pluralité de mandants</li><li>Liberté d'organisation</li></ul></div></div></section></template>
<template id="tpl-ch06"><header><div class="chapter-meta"><span>Module IV · Fiscalité</span><span class="chapter-meta-divider"></span><span>Chapitre 6</span></div><h1 class="chapter-title"><span class="num">06</span>Impôt anticipé &amp; TVA</h1><p class="chapter-lede">Deux impôts indirects qui transitent par la comptabilité — l'IA et la TVA.</p><div class="chapter-stats"><span><span class="dot">●</span> 22 min</span><span><span class="dot">●</span> 6 leçons</span><span><span class="dot">●</span> Avancé</span></div><div class="objectives"><div class="objectives-label">À l'issue de ce chapitre</div><div class="objectives-title">Vous saurez —</div><ol><li>Comptabiliser le versement et le remboursement de l'impôt anticipé (35 %)</li><li>Identifier les taux de TVA en vigueur (normal, réduit, hébergement)</li><li>Distinguer méthode de décompte effective et taux de la dette fiscale nette</li><li>Comptabiliser TVA sur ventes (1170) et TVA sur achats (1171)</li></ol></div></header><section class="section" id="s-6-1"><div class="section-num"><span>§ 6.1</span></div><h2 class="section-title">L'impôt anticipé (IA)</h2><p>L'impôt anticipé est un impôt à la source de <strong>35 %</strong>, perçu par la Confédération sur les rendements de capitaux mobiliers (intérêts, dividendes). Il est restitué au bénéficiaire qui déclare correctement le revenu.</p><h3>Cas : dividende brut de 10'000 CHF</h3><div class="formula"><div class="formula-cap"><span class="formula-label">Fiscalité — I</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">Mécanique de l'IA</div><div class="formula-eq">Montant brut × 65 % = Montant net versé</div><div class="formula-legend"><span><b>IA</b>35 % retenu à la source</span><span><b>Brut</b>Dividende ou intérêt déclaré</span><span><b>Net</b>Encaissé par le bénéficiaire</span></div></div><div class="journal"><div class="journal-cap"><strong>Encaissement du dividende net</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">1020 Banque</td><td class="acct">6680 Produits de participations</td><td class="amount">6 500.00</td><td class="comment">Dividende net (65 %)</td></tr><tr><td class="acct">1176 Impôt anticipé à récup.</td><td class="acct">6680 Produits de participations</td><td class="amount">3 500.00</td><td class="comment">IA retenu à la source</td></tr></tbody></table></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Récupération</div><div class="keyconcept-body">L'IA est récupéré via la déclaration fiscale (personne physique) ou directement via le <strong>formulaire 25</strong> (personne morale) — il devient un actif transitoire jusqu'à remboursement effectif.</div></div></section><section class="section" id="s-6-2"><div class="section-num"><span>§ 6.2</span></div><h2 class="section-title">TVA — généralités</h2><p>La TVA est un impôt indirect sur la consommation prélevé à chaque stade de la chaîne économique. L'entreprise n'en est qu'un percepteur : elle collecte sur ses ventes et récupère sur ses achats.</p><h3>Assujettissement</h3><ul class="bullets"><li>Obligatoire dès 100'000 CHF de chiffre d'affaires annuel</li><li>Volontaire en dessous du seuil — pour récupérer la TVA en amont</li><li>Exclu : opérations dans le champ de l'impôt mais non imposables</li><li>Exonéré : opérations expressément libérées (santé, formation, location)</li></ul></section><section class="section" id="s-6-3"><div class="section-num"><span>§ 6.3</span></div><h2 class="section-title">Taux d'imposition TVA</h2><p>Trois taux coexistent en Suisse — le taux normal pour la majorité des biens et services, un taux réduit pour les biens de première nécessité, et un taux spécial pour l'hébergement.</p><div class="dtable"><table><thead><tr><th>Type</th><th class="right">Taux 2024+</th><th>Exemples</th></tr></thead><tbody><tr><td>Normal</td><td class="right accent">8.1 %</td><td class="dim">Biens et services standard</td></tr><tr><td>Réduit</td><td class="right accent">2.6 %</td><td class="dim">Alimentation, livres, médicaments, eau</td></tr><tr><td>Hébergement</td><td class="right accent">3.8 %</td><td class="dim">Nuitées hôtelières (avec petit-déj.)</td></tr></tbody></table></div><div class="lawarticle"><div class="lawarticle-tag">Art. 24 LTVA<span class="ref">Loi sur la TVA</span></div><div class="lawarticle-body">La base de calcul est constituée de la contre-prestation effectivement reçue par le fournisseur, TVA non comprise.</div></div><div class="callout note"><div class="callout-label">AVS 21</div><div>Hausse en vigueur depuis le 1ᵉʳ janvier 2024 pour financer la réforme AVS 21. Précédents : 7.7 % / 2.5 % / 3.7 %.</div></div></section><section class="section" id="s-6-4"><div class="section-num"><span>§ 6.4</span></div><h2 class="section-title">Fonctionnement &amp; déduction de l'impôt préalable</h2><p>L'entreprise assujettie facture la TVA à ses clients (TVA due) et déduit la TVA payée à ses fournisseurs (impôt préalable). Elle ne reverse à l'AFC que le solde net.</p><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Prestations à soi-même</div><div class="keyconcept-body">Quand un assujetti utilise pour ses besoins privés (ou ceux du personnel) des biens acquis avec déduction de l'impôt préalable, il doit auto-facturer la TVA — règle d'égalité de traitement avec un consommateur.</div></div></section><section class="section" id="s-6-5"><div class="section-num"><span>§ 6.5</span></div><h2 class="section-title">Méthodes de décompte</h2><div class="compare"><div class="compare-side"><div class="head">Effective</div><div class="title">LTVA art. 36</div><ul><li>TVA collectée − impôt préalable facture par facture</li><li>Décompte trimestriel</li><li>Plus précis, plus lourd administrativement</li></ul></div><div class="compare-divider">/</div><div class="compare-side"><div class="head">Dette nette</div><div class="title">LTVA art. 37</div><ul><li>Taux de la dette fiscale nette (TDFN)</li><li>Décompte semestriel</li><li>Disponible si CA ≤ 5'024'000 CHF</li><li>Pas de récupération séparée de l'IP</li></ul></div></div><div class="callout note"><div class="callout-label">Choix</div><div>Le choix d'une méthode lie l'entreprise pour au moins 1 an (effective) ou 3 ans (TDFN). Le retour à l'effective est possible mais formalisé.</div></div><div class="formula"><div class="formula-cap"><span class="formula-label">TVA — décompte</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">TVA à payer à l'AFC</div><div class="formula-eq">TVA due (ventes) − Impôt préalable (achats)</div><div class="formula-legend"><span><b>TVA due</b>Compte 2200</span><span><b>I.P. achats</b>Compte 1170</span><span><b>I.P. invest.</b>Compte 1171</span></div></div><p class="muted">Solde positif → dette envers l'AFC. Solde négatif → créance (remboursement).</p></section><section class="section" id="s-6-6"><div class="section-num"><span>§ 6.6</span></div><h2 class="section-title">Comptabilisation pratique</h2><h3>Vente avec TVA 8.1 % — produit net 10'000 CHF</h3><div class="journal"><div class="journal-cap"><strong>Facturation client</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">1100 Créances clients</td><td class="acct">3000 Ventes de marchandises</td><td class="amount">10 000.00</td><td class="comment">Vente HT</td></tr><tr><td class="acct">1100 Créances clients</td><td class="acct">2200 TVA due</td><td class="amount">810.00</td><td class="comment">TVA collectée 8.1 %</td></tr></tbody></table></div><h3>Achat avec TVA 8.1 % — facture 5'000 CHF HT</h3><div class="journal"><div class="journal-cap"><strong>Réception facture fournisseur</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">4000 Charges de marchandises</td><td class="acct">2000 Dettes fourn.</td><td class="amount">5 000.00</td><td class="comment">Achat HT</td></tr><tr><td class="acct">1170 IP sur achats</td><td class="acct">2000 Dettes fourn.</td><td class="amount">405.00</td><td class="comment">TVA préalable récupérable</td></tr></tbody></table></div><h3>Décompte trimestriel — solde dû à l'AFC</h3><div class="journal"><div class="journal-cap"><strong>Régularisation au décompte</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">2200 TVA due</td><td class="acct">1170 IP sur achats</td><td class="amount">405.00</td><td class="comment">Imputation IP</td></tr><tr><td class="acct">2200 TVA due</td><td class="acct">1020 Banque</td><td class="amount">405.00</td><td class="comment">Versement net à l'AFC</td></tr></tbody></table></div></section></template>
<template id="tpl-ch07"><header><div class="chapter-meta"><span>Module V · Financement</span><span class="chapter-meta-divider"></span><span>Chapitre 7</span></div><h1 class="chapter-title"><span class="num">07</span>Leasing &amp; factoring</h1><p class="chapter-lede">Deux techniques de financement à court ou moyen terme — usage vs. cession de créance.</p><div class="chapter-stats"><span><span class="dot">●</span> 12 min</span><span><span class="dot">●</span> 4 leçons</span><span><span class="dot">●</span> Intermédiaire</span></div><div class="objectives"><div class="objectives-label">À l'issue de ce chapitre</div><div class="objectives-title">Vous saurez —</div><ol><li>Distinguer leasing d'exploitation et leasing financier</li><li>Comptabiliser un leasing direct ou indirect</li><li>Identifier les types de contrats de factoring</li><li>Reconnaître l'effet du factoring sur le BFR</li></ol></div></header><section class="section" id="s-7-1"><div class="section-num"><span>§ 7.1</span></div><h2 class="section-title">Notion de leasing</h2><p>Le leasing est un contrat par lequel un <strong>bailleur</strong> (donneur) met à disposition d'un <strong>preneur</strong> un bien d'investissement contre paiement de redevances périodiques. Il combine usage (location), financement (étalement) et parfois achat (option finale).</p><div class="compare"><div class="compare-side"><div class="head">Direct</div><div class="title">Sans intermédiaire financier</div><ul><li>Le fabricant loue directement au preneur</li><li>Souvent stratégie commerciale</li></ul></div><div class="compare-divider">/</div><div class="compare-side"><div class="head">Indirect</div><div class="title">Via un bailleur financier</div><ul><li>Société de leasing intermédiaire</li><li>Achat-revente ou crédit-bail</li></ul></div></div></section><section class="section" id="s-7-2"><div class="section-num"><span>§ 7.2</span></div><h2 class="section-title">Catégories — exploitation vs. financier</h2><div class="compare"><div class="compare-side"><div class="head">Exploitation</div><div class="title">Operating lease</div><ul><li>Durée courte par rapport à la vie économique</li><li>Risques chez le bailleur</li><li>Pas d'inscription au bilan du preneur</li><li>Redevances = charges directes</li></ul></div><div class="compare-divider">≷</div><div class="compare-side"><div class="head">Financier</div><div class="title">Financial lease</div><ul><li>Durée proche de la vie économique</li><li>Risques transférés au preneur</li><li>Inscription possible au bilan (substance &gt; forme)</li><li>Option d'achat fréquente</li></ul></div></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Annexe obligatoire</div><div class="keyconcept-body">Art. 959c CO impose d'indiquer en annexe la <strong>valeur résiduelle des dettes de crédit-bail</strong> dans la mesure où elles n'échoient pas dans les 12 mois.</div></div></section><section class="section" id="s-7-3"><div class="section-num"><span>§ 7.3</span></div><h2 class="section-title">Comptabilisation</h2><h3>Leasing d'exploitation — redevance 1'500 CHF / mois</h3><div class="journal"><div class="journal-cap"><strong>Paiement de la redevance mensuelle</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">6500 Charges de leasing</td><td class="acct">1020 Banque</td><td class="amount">1 500.00</td><td class="comment">Loyer leasing mensuel</td></tr></tbody></table></div><h3>Leasing financier — valeur initiale 60'000, durée 4 ans</h3><div class="journal"><div class="journal-cap"><strong>Activation à l'entrée en jouissance</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">1500 Machines</td><td class="acct">2451 Dette de crédit-bail</td><td class="amount">60 000.00</td><td class="comment">Inscription valeur actuelle nette</td></tr></tbody></table></div><div class="journal"><div class="journal-cap"><strong>Redevance annuelle (partie capital + intérêts)</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">2451 Dette de crédit-bail</td><td class="acct">1020 Banque</td><td class="amount">13 000.00</td><td class="comment">Remboursement capital</td></tr><tr><td class="acct">6900 Intérêts</td><td class="acct">1020 Banque</td><td class="amount">2 600.00</td><td class="comment">Charge financière</td></tr></tbody></table></div></section><section class="section" id="s-7-4"><div class="section-num"><span>§ 7.4</span></div><h2 class="section-title">Le factoring</h2><p>Le factoring est la cession des créances commerciales à un organisme spécialisé (<strong>factor</strong>) qui en assure le recouvrement, le financement immédiat (avance), et éventuellement la couverture du risque d'insolvabilité.</p><div class="dtable"><table><thead><tr><th>Type de contrat</th><th>Risque de non-paiement</th></tr></thead><tbody><tr><td>Factoring avec recours</td><td class="accent">Reste chez le cédant</td></tr><tr><td>Factoring sans recours</td><td class="accent">Transféré au factor (assurance-crédit)</td></tr><tr><td>Factoring confidentiel (notification omise)</td><td class="accent">Selon contrat</td></tr></tbody></table></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Effet sur le BFR</div><div class="keyconcept-body">Le factoring réduit le besoin en fonds de roulement : les créances clients deviennent immédiatement de la trésorerie, au prix de la commission du factor (<strong>1 à 3 % du CA cédé</strong>).</div></div></section></template>
<template id="tpl-ch08"><header><div class="chapter-meta"><span>Module VI · Clôture</span><span class="chapter-meta-divider"></span><span>Chapitre 8</span></div><h1 class="chapter-title"><span class="num">08</span>Évaluation des actifs &amp; passifs</h1><p class="chapter-lede">Principe de prudence — au plus haut le coût d'acquisition, au plus bas la valeur du marché.</p><div class="chapter-stats"><span><span class="dot">●</span> 16 min</span><span><span class="dot">●</span> 4 leçons</span><span><span class="dot">●</span> Avancé</span></div><div class="objectives"><div class="objectives-label">À l'issue de ce chapitre</div><div class="objectives-title">Vous saurez —</div><ol><li>Citer les principes généraux d'évaluation (CO 957a-960)</li><li>Distinguer évaluation individuelle et évaluation forfaitaire</li><li>Appliquer la valeur la plus basse aux stocks</li><li>Identifier les réserves latentes générées par sous-évaluation</li></ol></div></header><section class="section" id="s-8-1"><div class="section-num"><span>§ 8.1</span></div><h2 class="section-title">Considérations globales</h2><p>L'évaluation des éléments du bilan doit traduire fidèlement la situation patrimoniale tout en respectant le principe de prudence. Quatre principes fondamentaux encadrent l'évaluation : <strong>continuité, prudence, individualité, périodicité</strong>.</p><div class="fourup"><div class="threeup-card"><div class="pre">Continuité</div><div class="ttl">Going concern</div><div class="sub">L'activité se poursuit</div></div><div class="threeup-card"><div class="pre">Prudence</div><div class="ttl">Asymétrie</div><div class="sub">Pertes anticipées</div></div><div class="threeup-card"><div class="pre">Individualité</div><div class="ttl">Pièce à pièce</div><div class="sub">Pas de compensation</div></div><div class="threeup-card"><div class="pre">Périodicité</div><div class="ttl">Exercice</div><div class="sub">Rattachement temporel</div></div></div><div class="lawarticle"><div class="lawarticle-tag">Art. 960 al. 2 CO<span class="ref">Code des obligations</span></div><div class="lawarticle-body">L'évaluation doit être prudente, mais ne doit pas empêcher une appréciation fiable de la situation économique de l'entreprise.</div></div></section><section class="section" id="s-8-2"><div class="section-num"><span>§ 8.2</span></div><h2 class="section-title">Évaluation des actifs</h2><div class="dtable"><table><thead><tr><th>Poste</th><th>Évaluation à l'entrée</th><th>Évaluation subséquente</th></tr></thead><tbody><tr><td>Liquidités</td><td>Valeur nominale</td><td class="accent">Valeur nominale</td></tr><tr><td>Créances</td><td>Valeur nominale</td><td class="accent">− ducroire</td></tr><tr><td>Stocks</td><td>Coût d'acquisition</td><td class="accent">Le plus bas (acquisition / marché)</td></tr><tr><td>Titres cotés</td><td>Coût d'acquisition</td><td class="accent">Valeur boursière au bouclement</td></tr><tr><td>Immobilisations</td><td>Coût d'acquisition</td><td class="accent">− amortissements</td></tr></tbody></table></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Lower of cost or market</div><div class="keyconcept-body">Pour les stocks, c'est la <strong>valeur la plus basse</strong> entre coût d'acquisition et valeur du marché qui prévaut au bouclement — corollaire du principe de prudence.</div></div></section><section class="section" id="s-8-3"><div class="section-num"><span>§ 8.3</span></div><h2 class="section-title">Évaluation des passifs</h2><p>Les dettes sont en règle générale évaluées à leur <strong>valeur de remboursement</strong>. Les engagements à long terme en devises sont convertis au cours de clôture.</p><div class="dtable"><table><thead><tr><th>Poste</th><th>Principe d'évaluation</th></tr></thead><tbody><tr><td>Dettes en CHF</td><td class="accent">Valeur nominale de remboursement</td></tr><tr><td>Dettes en devises</td><td class="accent">Au cours de clôture (gain/perte au CR)</td></tr><tr><td>Provisions</td><td class="accent">Montant nécessaire estimé (art. 960e CO)</td></tr><tr><td>Capital</td><td class="accent">Valeur nominale émise</td></tr></tbody></table></div><div class="lawarticle"><div class="lawarticle-tag">Art. 960a CO<span class="ref">Code des obligations</span></div><div class="lawarticle-body">Lors de sa première comptabilisation, un actif est évalué au plus à son coût d'acquisition ou à son coût de revient.</div></div></section><section class="section" id="s-8-4"><div class="section-num"><span>§ 8.4</span></div><h2 class="section-title">Réserves latentes &amp; exemples chiffrés</h2><p>Une sous-évaluation systématique de l'actif (ou sur-évaluation du passif) constitue une <strong>réserve latente</strong> — partie cachée des fonds propres, autorisée par le CO mais interdite par les normes reconnues.</p><div class="dtable"><div class="dtable-cap">Exemples chiffrés</div><table><thead><tr><th>Poste</th><th class="num right">Valeur économique</th><th class="num right">Bilan CO</th><th class="right">Réserve latente</th></tr></thead><tbody><tr><td>Stocks</td><td class="num right">180 000.−</td><td class="num right">150 000.−</td><td class="right accent">30 000.−</td></tr><tr><td>Immeuble</td><td class="num right">1 200 000.−</td><td class="num right">900 000.−</td><td class="right accent">300 000.−</td></tr><tr><td>Machines</td><td class="num right">240 000.−</td><td class="num right">200 000.−</td><td class="right accent">40 000.−</td></tr><tr class="total"><td>Total</td><td class="num right">1 620 000.−</td><td class="num right">1 250 000.−</td><td class="right accent">370 000.−</td></tr></tbody></table></div></section></template>
<template id="tpl-ch09"><header><div class="chapter-meta"><span>Module VI · Clôture</span><span class="chapter-meta-divider"></span><span>Chapitre 9</span></div><h1 class="chapter-title"><span class="num">09</span>Bouclement annuel des comptes</h1><p class="chapter-lede">De la balance brute au rapport annuel — la chronologie d'une clôture maîtrisée.</p><div class="chapter-stats"><span><span class="dot">●</span> 28 min</span><span><span class="dot">●</span> 6 leçons</span><span><span class="dot">●</span> Avancé</span></div><div class="objectives"><div class="objectives-label">À l'issue de ce chapitre</div><div class="objectives-title">Vous saurez —</div><ol><li>Décrire le processus comptable de bouclement étape par étape</li><li>Identifier l'obligation de tenir une comptabilité selon la forme juridique</li><li>Établir un rapport annuel conforme aux art. 958-961 CO</li><li>Comptabiliser la répartition du bénéfice d'une SA</li></ol></div></header><section class="section" id="s-9-1"><div class="section-num"><span>§ 9.1</span></div><h2 class="section-title">Généralités</h2><p>Le bouclement annuel synthétise un exercice par l'établissement des comptes annuels — bilan, compte de résultat, annexe, et le cas échéant tableau de flux de trésorerie et rapport de performance.</p></section><section class="section" id="s-9-2"><div class="section-num"><span>§ 9.2</span></div><h2 class="section-title">Le processus comptable</h2><div class="dtable"><table><thead><tr><th>Étape</th><th>Opération</th><th>Objectif</th></tr></thead><tbody><tr><td>1</td><td>Balance brute</td><td class="dim">Vérifier l'équilibre Débit = Crédit</td></tr><tr><td>2</td><td>Inventaire physique</td><td class="dim">Stocks, immobilisations, créances</td></tr><tr><td>3</td><td>Régularisations</td><td class="dim">Charges / produits à cheval</td></tr><tr><td>4</td><td>Amortissements</td><td class="dim">Pertes de valeur de l'exercice</td></tr><tr><td>5</td><td>Provisions</td><td class="dim">Risques estimés</td></tr><tr><td>6</td><td>Balance après inventaire</td><td class="dim">Image fidèle prête à publier</td></tr><tr><td>7</td><td>Détermination du résultat</td><td class="dim">Solde des comptes de gestion</td></tr><tr><td>8</td><td>Comptes annuels &amp; annexe</td><td class="dim">Rapport légal</td></tr></tbody></table></div><div class="lawarticle"><div class="lawarticle-tag">Art. 958 CO<span class="ref">Code des obligations</span></div><div class="lawarticle-body">Les comptes annuels doivent présenter la situation économique de l'entreprise de façon qu'un tiers puisse s'en faire une opinion fondée.</div></div></section><section class="section" id="s-9-3"><div class="section-num"><span>§ 9.3</span></div><h2 class="section-title">L'obligation de tenir une comptabilité</h2><div class="compare"><div class="compare-side"><div class="head">Régime allégé</div><div class="title">Comptabilité simplifiée</div><ul><li>Recettes / dépenses / situation patrimoniale</li><li>Entreprises individuelles &lt; 500'000 CHF CA</li><li>Associations &amp; fondations non astreintes</li></ul></div><div class="compare-divider">≷</div><div class="compare-side"><div class="head">Régime complet</div><div class="title">Comptabilité commerciale</div><ul><li>Bilan, CR, annexe selon CO</li><li>Sociétés de capitaux et coopératives</li><li>Au-delà du seuil de CA</li></ul></div></div><div class="lawarticle"><div class="lawarticle-tag">Art. 957 CO<span class="ref">Code des obligations</span></div><div class="lawarticle-body">Doivent tenir une comptabilité : les sociétés commerciales et coopératives, les entreprises individuelles et sociétés de personnes dépassant 500'000 CHF de CA, et les personnes morales tenues de s'inscrire au registre du commerce.</div></div></section><section class="section" id="s-9-4"><div class="section-num"><span>§ 9.4</span></div><h2 class="section-title">Le rapport annuel &amp; rapport de gestion</h2><p>Le rapport annuel comprend les comptes annuels et, pour les grandes entreprises, un rapport de gestion. Il est destiné à informer associés, créanciers et autorités.</p><ul class="bullets"><li>Marche des affaires sur l'exercice</li><li>Situation économique de l'entreprise</li><li>Réalisation d'une analyse de risques</li><li>Perspectives et événements futurs significatifs</li><li>Commandes et mandats reçus, activité de recherche &amp; développement</li></ul><div class="callout note"><div class="callout-label">Art. 961c</div><div>Le rapport de gestion est exigé pour les grandes entreprises soumises au contrôle ordinaire (deux des trois seuils : bilan 20 M CHF, CA 40 M CHF, 250 EPT).</div></div></section><section class="section" id="s-9-5"><div class="section-num"><span>§ 9.5</span></div><h2 class="section-title">Les opérations de clôture</h2><p>Les opérations de clôture sont l'ensemble des écritures techniques qui transforment la balance brute en comptes annuels publiables.</p><ul class="bullets"><li>Régularisation des charges et produits (1300, 2300, 1301, 2301)</li><li>Inventaires physiques : stocks, immobilisations, créances</li><li>Ducroire sur créances clients (1109)</li><li>Amortissements directs ou indirects (6820 / 1509)</li><li>Provisions pour risques et charges (2330, 2600)</li><li>Réserves latentes (mouvements éventuels)</li><li>Détermination du bénéfice et répartition</li></ul></section><section class="section" id="s-9-6"><div class="section-num"><span>§ 9.6</span></div><h2 class="section-title">Répartition du bénéfice dans une SA</h2><p>Le bénéfice net distribuable est affecté selon une cascade légale : <strong>réserve légale, réserves statutaires, dividendes, report à nouveau</strong>. L'art. 671 CO encadre cette répartition.</p><h3>Cas : SA, bénéfice de l'exercice 200'000 CHF</h3><div class="dtable"><table><thead><tr><th>Affectation</th><th class="right">Montant</th><th>Base</th></tr></thead><tbody><tr><td>Bénéfice de l'exercice</td><td class="right accent">200 000.−</td><td class="dim">Compte 9000</td></tr><tr><td>+ Report à nouveau</td><td class="right accent">+45 000.−</td><td class="dim">Compte 2970</td></tr><tr class="total"><td>= Bénéfice au bilan</td><td class="right accent">245 000.−</td><td class="dim">Disponible</td></tr><tr><td>− Réserve légale (5 %)</td><td class="right accent">−10 000.−</td><td class="dim">Art. 672 CO</td></tr><tr><td>− Dividende brut</td><td class="right accent">−120 000.−</td><td class="dim">Décision AG</td></tr><tr class="total"><td>= Report à nouveau N+1</td><td class="right accent">115 000.−</td><td class="dim">Compte 2970</td></tr></tbody></table></div><div class="journal"><div class="journal-cap"><strong>Versement du dividende — IA 35 %</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">2950 Bénéfice au bilan</td><td class="acct">2270 Dividende à payer</td><td class="amount">120 000.00</td><td class="comment">Dividende brut</td></tr><tr><td class="acct">2270 Dividende à payer</td><td class="acct">1020 Banque</td><td class="amount">78 000.00</td><td class="comment">Net versé aux actionnaires</td></tr><tr><td class="acct">2270 Dividende à payer</td><td class="acct">2206 IA à payer</td><td class="amount">42 000.00</td><td class="comment">IA 35 % retenu</td></tr></tbody></table></div></section></template>
<template id="tpl-ch10"><header><div class="chapter-meta"><span>Module VII · Cas spéciaux</span><span class="chapter-meta-divider"></span><span>Chapitre 10</span></div><h1 class="chapter-title"><span class="num">10</span>Assainissement &amp; liquidation</h1><p class="chapter-lede">Quand la perte de capital s'installe — mesures, sursis concordataire, dissolution.</p><div class="chapter-stats"><span><span class="dot">●</span> 22 min</span><span><span class="dot">●</span> 6 leçons</span><span><span class="dot">●</span> Avancé</span></div><div class="objectives"><div class="objectives-label">À l'issue de ce chapitre</div><div class="objectives-title">Vous saurez —</div><ol><li>Identifier les signaux d'alerte d'un bilan déficitaire (art. 725 CO)</li><li>Distinguer mesures financières, juridiques et opérationnelles d'assainissement</li><li>Comprendre la mécanique du sursis concordataire</li><li>Comptabiliser les opérations de liquidation et de partage</li></ol></div></header><section class="section" id="s-10-1"><div class="section-num"><span>§ 10.1</span></div><h2 class="section-title">Les raisons d'un assainissement</h2><p>Un assainissement devient nécessaire lorsque la société présente une perte qui érode les fonds propres au point de compromettre la continuité d'exploitation. Plusieurs facteurs déclenchent ce besoin.</p><ul class="bullets"><li>Pertes répétées sur plusieurs exercices</li><li>Sur-investissement ou mauvaise allocation des ressources</li><li>Marché en récession ou disparition d'un client clé</li><li>Surendettement structurel (intérêts &gt; marge brute)</li><li>Sous-capitalisation initiale chronique</li></ul><div class="lawarticle"><div class="lawarticle-tag">Art. 725 CO<span class="ref">Code des obligations</span></div><div class="lawarticle-body">Le conseil d'administration doit convoquer immédiatement une AG s'il existe des raisons sérieuses d'admettre que la société est surendettée. Si les fonds propres ne couvrent plus la moitié du capital-actions et des réserves légales, des mesures s'imposent.</div></div></section><section class="section" id="s-10-2"><div class="section-num"><span>§ 10.2</span></div><h2 class="section-title">Types de bilans déficitaires</h2><div class="compare"><div class="compare-side"><div class="head">Perte en capital</div><div class="title">FP &lt; ½ (capital + rés. lég.)</div><ul><li>Le CA doit convoquer une AG immédiate</li><li>Présentation de mesures d'assainissement</li><li>Pas encore d'avis au juge</li></ul></div><div class="compare-divider">→</div><div class="compare-side"><div class="head">Surendettement</div><div class="title">Actifs &lt; passifs étrangers</div><ul><li>Bilan intermédiaire à valeurs d'exploitation et de liquidation</li><li>Avis obligatoire au juge — sauf postposition</li><li>Possible faillite si non redressé</li></ul></div></div></section><section class="section" id="s-10-3"><div class="section-num"><span>§ 10.3</span></div><h2 class="section-title">Le compte d'assainissement</h2><p>Le compte d'assainissement (2980 ou 2990) reçoit les bonifications opérées par les actionnaires ou tiers en vue de compenser les pertes — apports à fonds perdus, abandons de créance, remises d'intérêts.</p><div class="journal"><div class="journal-cap"><strong>Abandon de créance par l'actionnaire principal</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">2000 Dettes fournisseurs</td><td class="acct">2990 Compte d'assainissement</td><td class="amount">150 000.00</td><td class="comment">Abandon créance à fonds perdus</td></tr></tbody></table></div><div class="journal"><div class="journal-cap"><strong>Imputation des pertes reportées</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">2990 Compte d'assainissement</td><td class="acct">2979 Pertes reportées</td><td class="amount">150 000.00</td><td class="comment">Apurement des pertes</td></tr></tbody></table></div></section><section class="section" id="s-10-4"><div class="section-num"><span>§ 10.4</span></div><h2 class="section-title">Mesures d'assainissement</h2><div class="dtable"><table><thead><tr><th>Catégorie</th><th>Mesure</th><th>Effet comptable</th></tr></thead><tbody><tr><td>Financière</td><td>Apport à fonds perdus</td><td class="accent">Augmentation FP</td></tr><tr><td>Financière</td><td>Abandon de créance</td><td class="accent">Dette éteinte → produit excep.</td></tr><tr><td>Financière</td><td>Postposition</td><td class="accent">Dette maintenue mais subordonnée</td></tr><tr><td>Juridique</td><td>Réduction de capital</td><td class="accent">Apure pertes contre nominal</td></tr><tr><td>Juridique</td><td>Augmentation de capital</td><td class="accent">Nouveaux apports en numéraire</td></tr><tr><td>Opérationnelle</td><td>Cession d'actifs non stratégiques</td><td class="accent">Trésorerie + plus-value</td></tr><tr><td>Opérationnelle</td><td>Restructuration des coûts</td><td class="accent">Réduction des charges fixes</td></tr></tbody></table></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">La postposition</div><div class="keyconcept-body">Engagement écrit d'un créancier (souvent un actionnaire) à ne réclamer son dû qu'<strong>après désintéressement intégral</strong> des autres créanciers — permet d'éviter l'avis au juge sans extinction effective de la dette.</div></div></section><section class="section" id="s-10-5"><div class="section-num"><span>§ 10.5</span></div><h2 class="section-title">Le sursis concordataire</h2><p>Le sursis concordataire est une procédure judiciaire qui protège l'entreprise de poursuites pendant qu'elle négocie un concordat avec ses créanciers. Trois formes : <strong>sursis provisoire</strong>, <strong>sursis définitif</strong>, <strong>concordat-dividende</strong>.</p><div class="threeup"><div class="threeup-card"><div class="pre">Sursis provisoire</div><div class="ttl">4 mois</div><div class="sub">Protection initiale</div></div><div class="threeup-card"><div class="pre">Sursis définitif</div><div class="ttl">6-24 mois</div><div class="sub">Négociation</div></div><div class="threeup-card"><div class="pre">Dividende</div><div class="ttl">20-30%</div><div class="sub">Aux créanciers ordinaires</div></div></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Commissaire au concordat</div><div class="keyconcept-body">Le juge désigne un commissaire qui supervise la gestion et examine la situation économique. L'entreprise conserve son pouvoir mais sous contrôle externe.</div></div></section><section class="section" id="s-10-6"><div class="section-num"><span>§ 10.6</span></div><h2 class="section-title">Liquidation — motifs &amp; comptabilisation</h2><ul class="bullets"><li>Liquidation volontaire — décision de l'AG avec majorité qualifiée</li><li>Liquidation forcée — prononcée par le juge (faillite)</li><li>Dissolution sans liquidation — fusion absorption</li></ul><div class="dtable"><div class="dtable-cap">Compte de liquidation — bilan SARL résumé</div><table><thead><tr><th>Poste</th><th class="num right">Val. comptable</th><th class="right">Val. réalisation</th></tr></thead><tbody><tr><td>Stocks</td><td class="num right">120 000.−</td><td class="right accent">85 000.−</td></tr><tr><td>Créances</td><td class="num right">180 000.−</td><td class="right accent">162 000.−</td></tr><tr><td>Machines</td><td class="num right">240 000.−</td><td class="right accent">75 000.−</td></tr><tr class="total"><td>Total actifs</td><td class="num right">540 000.−</td><td class="right accent">322 000.−</td></tr><tr><td>Pertes de liquidation</td><td class="num right"></td><td class="right accent">−218 000.−</td></tr></tbody></table></div><div class="callout attention"><div class="callout-label">Ordre de paiement</div><div>Priorité légale — 1ʳᵉ classe : salaires, AVS · 2ᵉ classe : autres assurances sociales · 3ᵉ classe : créanciers ordinaires. Les actionnaires ne récupèrent que le solde après désintéressement total.</div></div></section></template>
<template id="tpl-ch11"><header><div class="chapter-meta"><span>Module VIII · Analytique</span><span class="chapter-meta-divider"></span><span>Chapitre 11</span></div><h1 class="chapter-title"><span class="num">11</span>Comptabilité analytique</h1><p class="chapter-lede">Au-delà de la CG — calculer le prix de revient, piloter les centres de coûts, fonder les décisions.</p><div class="chapter-stats"><span><span class="dot">●</span> 30 min</span><span><span class="dot">●</span> 6 leçons</span><span><span class="dot">●</span> Avancé</span></div><div class="objectives"><div class="objectives-label">À l'issue de ce chapitre</div><div class="objectives-title">Vous saurez —</div><ol><li>Distinguer comptabilité générale (CG) et analytique d'exploitation (CAE)</li><li>Réaliser les 4 délimitations matérielles entre CG et CAE</li><li>Calculer un prix de revient en coûts complets via les centres de coûts</li><li>Appliquer la méthode des coûts partiels (direct costing)</li></ol></div></header><section class="section" id="s-11-1"><div class="section-num"><span>§ 11.1</span></div><h2 class="section-title">Pourquoi une CAE ?</h2><p>À partir d'une certaine taille ou complexité, les informations de la CG conformes aux prescriptions légales ne sont plus suffisantes pour un contrôle de gestion efficace. La CAE comble cette lacune en imputant charges et produits à des <strong>centres de profit</strong> et des <strong>prix de revient</strong>.</p><div class="threeup"><div class="threeup-card"><div class="pre">CG</div><div class="ttl">Légale</div><div class="sub">Image externe — CO</div></div><div class="threeup-card"><div class="pre">CAE</div><div class="ttl">Gestion</div><div class="sub">Pilotage interne</div></div><div class="threeup-card"><div class="pre">ERP</div><div class="ttl">Intégrée</div><div class="sub">Source de données unique</div></div></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Charges directes vs. indirectes</div><div class="keyconcept-body">Les charges <strong>directes</strong> sont affectables à un produit spécifique (matières premières, salaires de production). Les <strong>indirectes</strong> (loyer, électricité) sont réparties via des clés de répartition vers les centres de coûts.</div></div></section><section class="section" id="s-11-2"><div class="section-num"><span>§ 11.2</span></div><h2 class="section-title">Les 4 délimitations matérielles</h2><p>Pour passer de la CG à la CAE, quatre groupes d'ajustements sont nécessaires afin d'obtenir les valeurs économiques réelles.</p><div class="dtable"><table><thead><tr><th>Poste</th><th>En CG</th><th>En CAE</th></tr></thead><tbody><tr><td>Matières premières</td><td class="dim">Stock comptable (rés. latentes)</td><td class="accent">Valeur économique</td></tr><tr><td>Personnel</td><td class="dim">Salaires + charges</td><td class="accent">Délimitations strictes (13ᵉ, vacances)</td></tr><tr><td>Intérêts</td><td class="dim">Sur fonds étrangers</td><td class="accent">+ Intérêts calculés sur FP</td></tr><tr><td>Amortissements</td><td class="dim">Taux fiscaux AFC</td><td class="accent">Taux économiques (vie utile)</td></tr></tbody></table></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Coût d'opportunité du capital propre</div><div class="keyconcept-body">La CAE intègre des intérêts calculés sur les fonds propres : c'est le profit auquel on renonce en immobilisant ce capital plutôt qu'en l'investissant ailleurs. <strong>Coût économique invisible en CG.</strong></div></div></section><section class="section" id="s-11-3"><div class="section-num"><span>§ 11.3</span></div><h2 class="section-title">Centres de coûts &amp; prix de revient</h2><div class="compare"><div class="compare-side"><div class="head">C.C. secondaires</div><div class="title">Auxiliaires</div><ul><li>Destinataires : d'autres centres de coûts</li><li>Ex : immeuble, restaurant, RH</li></ul></div><div class="compare-divider">→</div><div class="compare-side"><div class="head">C.C. principaux</div><div class="title">Opérationnels</div><ul><li>Destinataires : les prix de revient</li><li>Ex : achats, production, distribution</li></ul></div></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Taux d'imputation vs. taux de majoration</div><div class="keyconcept-body"><strong>Taux d'imputation</strong> : coût total du centre ÷ unité d'œuvre (heures, m²).&nbsp;<strong>Taux de majoration</strong> : pourcentage appliqué à une nature de charge (ex : +12 % sur consommation matières).</div></div></section><section class="section" id="s-11-4"><div class="section-num"><span>§ 11.4</span><span class="tag">Full costing</span></div><h2 class="section-title">Méthode des coûts complets</h2><p>La méthode des coûts complets impute toutes les charges (directes + indirectes) à chaque produit pour déterminer son prix de revient total. Idéale pour fixer un prix de vente avec marge calibrée.</p><div class="dtable"><div class="dtable-cap">Prix de revient — Produit A — coûts complets</div><table><thead><tr><th>Poste</th><th class="right">Valeur</th></tr></thead><tbody><tr><td>Coûts directs — affectables</td><td class="right accent"></td></tr><tr><td>  Matières premières</td><td class="right accent">+24.50</td></tr><tr><td>  MOD (main-d'œuvre)</td><td class="right accent">+18.20</td></tr><tr><td>  Sous-traitance</td><td class="right accent">+2.80</td></tr><tr class="total"><td>  Sous-total CD</td><td class="right accent">45.50</td></tr><tr><td>Coûts indirects — répartis</td><td class="right accent"></td></tr><tr><td>  C.C. Achats (10 %)</td><td class="right accent">+2.45</td></tr><tr><td>  C.C. Production (h MOD)</td><td class="right accent">+12.40</td></tr><tr><td>  C.C. Distribution (5 %)</td><td class="right accent">+3.10</td></tr><tr><td>  C.C. Administration (4 %)</td><td class="right accent">+2.45</td></tr><tr class="total"><td>  Sous-total CI</td><td class="right accent">20.40</td></tr><tr class="total"><td>PRIX DE REVIENT</td><td class="right accent">65.90 CHF</td></tr></tbody></table></div><p class="muted">Marge 25 % → PV 82.40 CHF</p></section><section class="section" id="s-11-5"><div class="section-num"><span>§ 11.5</span></div><h2 class="section-title">Méthode des coûts partiels</h2><p>Le <strong>direct costing</strong> ne retient que les coûts variables dans le calcul du prix de revient, laissant les coûts fixes au niveau de l'entreprise globale. Cette méthode éclaire la <strong>marge contributive</strong> — fondamentale pour les décisions à court terme.</p><div class="formula"><div class="formula-cap"><span class="formula-label">Contribution — I</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">Marge contributive unitaire</div><div class="formula-eq">MC = PV − CV unitaires</div><div class="formula-legend"><span><b>PV</b>Prix de vente</span><span><b>CV</b>Coûts variables unitaires</span></div></div><div class="formula"><div class="formula-cap"><span class="formula-label">Contribution — II</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">Seuil de rentabilité</div><div class="formula-eq">SR = Coûts fixes ÷ Taux de MC</div><div class="formula-legend"><span><b>SR</b>Chiffre d'affaires à atteindre</span><span><b>Taux MC</b>MC / CA</span></div></div><p class="muted">Exemple : CF 240'000 / Taux MC 30 % = <strong style="color: var(--accent);">SR 800'000 CHF</strong></p></section><section class="section" id="s-11-6"><div class="section-num"><span>§ 11.6</span></div><h2 class="section-title">Les ordres internes</h2><p>Un <strong>ordre interne</strong> accumule les charges relatives à un projet ponctuel (R&amp;D, foire, réparation majeure). Il transcende la grille des centres de coûts et permet un suivi par projet.</p><ul class="bullets"><li>Projets de R&amp;D — coûts capitalisables ou en charges</li><li>Réparations exceptionnelles d'immobilisations</li><li>Évènements et campagnes marketing ponctuelles</li><li>Études de marché, prototypes, salons internationaux</li></ul></section></template>
<template id="tpl-ch12"><header><div class="chapter-meta"><span>Module IX · Trésorerie</span><span class="chapter-meta-divider"></span><span>Chapitre 12</span></div><h1 class="chapter-title"><span class="num">12</span>Tableau de flux de trésorerie</h1><p class="chapter-lede">D'où vient le cash, où va le cash — les trois activités qui structurent la vie financière.</p><div class="chapter-stats"><span><span class="dot">●</span> 26 min</span><span><span class="dot">●</span> 5 leçons</span><span><span class="dot">●</span> Avancé</span></div><div class="objectives"><div class="objectives-label">À l'issue de ce chapitre</div><div class="objectives-title">Vous saurez —</div><ol><li>Distinguer écritures monétaires et non monétaires</li><li>Construire un flux d'exploitation par méthode directe ou indirecte</li><li>Identifier les flux d'investissement et de financement</li><li>Interpréter le cash-flow libre comme indicateur de santé</li></ol></div></header><section class="section" id="s-12-1"><div class="section-num"><span>§ 12.1</span></div><h2 class="section-title">Généralités</h2><p>Le tableau de flux de trésorerie indique la variation de la trésorerie pendant un exercice et renseigne sur la provenance et l'utilisation des moyens financiers, pour trois domaines distincts.</p><div class="threeup"><div class="threeup-card"><div class="pre">Flux I</div><div class="ttl">Exploitation</div><div class="sub">Génération opérationnelle</div></div><div class="threeup-card"><div class="pre">Flux II</div><div class="ttl">Investissement</div><div class="sub">Acquisitions / cessions</div></div><div class="threeup-card"><div class="pre">Flux III</div><div class="ttl">Financement</div><div class="sub">Dettes / fonds propres</div></div></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Écritures monétaires vs. non monétaires</div><div class="keyconcept-body">Seules les écritures monétaires (avec mouvement de trésorerie) impactent les flux. Les amortissements, provisions, gains/pertes de change non réalisés sont à <strong>neutraliser en méthode indirecte</strong>.</div></div></section><section class="section" id="s-12-2"><div class="section-num"><span>§ 12.2</span></div><h2 class="section-title">Flux d'exploitation</h2><div class="compare"><div class="compare-side"><div class="head">Directe</div><div class="title">Encaissements − décaissements</div><ul><li>+ Encaissements clients</li><li>− Décaissements fournisseurs</li><li>− Salaires payés</li><li>− Impôts payés</li><li class="plain">= Cash-flow d'exploitation</li></ul></div><div class="compare-divider">↔</div><div class="compare-side"><div class="head">Indirecte</div><div class="title">Résultat net retraité</div><ul><li>= Bénéfice de l'exercice</li><li>+ Amortissements &amp; provisions</li><li>± Variations du BFR</li><li>± Gains / pertes non monétaires</li><li class="plain">= Cash-flow d'exploitation</li></ul></div></div><div class="formula"><div class="formula-cap"><span class="formula-label">Cash-flow — I</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">Cash-flow d'exploitation indirect</div><div class="formula-eq">CFE = RN + Amort. + Prov. ± ΔBFR</div><div class="formula-legend"><span><b>RN</b>Résultat net</span><span><b>ΔBFR</b>Variation BFR (signe inversé)</span></div></div></section><section class="section" id="s-12-3"><div class="section-num"><span>§ 12.3</span></div><h2 class="section-title">Flux d'investissement</h2><p>Les flux d'investissement reflètent la politique d'expansion ou de renouvellement de l'outil productif. Un flux négatif n'est pas mauvais — il signifie souvent que l'entreprise investit pour l'avenir.</p><div class="dtable"><table><thead><tr><th>Opération</th><th class="right">Signe</th><th>Exemple</th></tr></thead><tbody><tr><td>Acquisition d'immobilisations</td><td class="right accent">−</td><td class="dim">Achat de machines, immeubles</td></tr><tr><td>Cession d'immobilisations</td><td class="right accent">+</td><td class="dim">Vente de matériel</td></tr><tr><td>Acquisition de titres</td><td class="right accent">−</td><td class="dim">Prise de participation</td></tr><tr><td>Cession de titres</td><td class="right accent">+</td><td class="dim">Sortie de participation</td></tr><tr><td>Prêts accordés</td><td class="right accent">−</td><td class="dim">Avances à filiales</td></tr></tbody></table></div></section><section class="section" id="s-12-4"><div class="section-num"><span>§ 12.4</span></div><h2 class="section-title">Flux de financement</h2><p>Les flux de financement décrivent les relations avec les apporteurs de capitaux — actionnaires (FP) et créanciers (FE).</p><div class="dtable"><table><thead><tr><th>Opération</th><th class="right">Signe</th><th>Exemple</th></tr></thead><tbody><tr><td>Augmentation de capital</td><td class="right accent">+</td><td class="dim">Émission d'actions nouvelles</td></tr><tr><td>Distribution de dividendes</td><td class="right accent">−</td><td class="dim">Versement aux actionnaires</td></tr><tr><td>Nouvel emprunt</td><td class="right accent">+</td><td class="dim">Crédit bancaire à long terme</td></tr><tr><td>Remboursement d'emprunt</td><td class="right accent">−</td><td class="dim">Amortissement dette</td></tr><tr><td>Rachat d'actions propres</td><td class="right accent">−</td><td class="dim">Self tender</td></tr></tbody></table></div></section><section class="section" id="s-12-5"><div class="section-num"><span>§ 12.5</span></div><h2 class="section-title">Cas — tableau de flux consolidé</h2><div class="dtable"><div class="dtable-cap">SA Exemple — Tableau de flux 2025 (CHF 000s)</div><table><thead><tr><th>Ligne</th><th class="right">Valeur</th></tr></thead><tbody><tr><td>Activité exploitation — Flux I</td><td class="right accent"></td></tr><tr><td>  Bénéfice net</td><td class="right accent">+ 142</td></tr><tr><td>  + Amortissements</td><td class="right accent">+ 180</td></tr><tr><td>  + Provisions nettes</td><td class="right accent">+ 35</td></tr><tr><td>  − Augmentation BFR</td><td class="right accent">− 68</td></tr><tr class="total"><td>  CFE</td><td class="right accent">+ 289</td></tr><tr><td>Activité investissement — Flux II</td><td class="right accent"></td></tr><tr><td>  Achat machines</td><td class="right accent">− 220</td></tr><tr><td>  Cession ancien matériel</td><td class="right accent">+ 45</td></tr><tr class="total"><td>  CFI</td><td class="right accent">− 175</td></tr><tr><td>Activité financement — Flux III</td><td class="right accent"></td></tr><tr><td>  Nouvel emprunt LT</td><td class="right accent">+ 150</td></tr><tr><td>  Remb. emprunt CT</td><td class="right accent">− 60</td></tr><tr><td>  Dividendes versés</td><td class="right accent">− 80</td></tr><tr class="total"><td>  CFF</td><td class="right accent">+ 10</td></tr><tr class="total"><td>Δ TRÉSORERIE</td><td class="right accent">+ 124</td></tr></tbody></table></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Cash-flow libre (FCF)</div><div class="keyconcept-body"><strong>CFE − Investissements de maintenance.</strong> C'est le cash réellement disponible pour rémunérer les apporteurs de capitaux. Indicateur fondamental de la qualité économique.</div></div></section></template>
<template id="tpl-ch13"><header><div class="chapter-meta"><span>Module X · Décision</span><span class="chapter-meta-divider"></span><span>Chapitre 13</span></div><h1 class="chapter-title"><span class="num">13</span>Les investissements</h1><p class="chapter-lede">Méthodes statiques et dynamiques — fonder une décision d'investissement.</p><div class="chapter-stats"><span><span class="dot">●</span> 20 min</span><span><span class="dot">●</span> 5 leçons</span><span><span class="dot">●</span> Avancé</span></div><div class="objectives"><div class="objectives-label">À l'issue de ce chapitre</div><div class="objectives-title">Vous saurez —</div><ol><li>Décrire le processus de décision d'investissement</li><li>Calculer le retour sur investissement (ROI) et le délai de récupération</li><li>Appliquer la Valeur Actuelle Nette (VAN) et le Taux Interne de Rentabilité (TIR)</li><li>Comparer méthodes statiques et dynamiques sur un cas concret</li></ol></div></header><section class="section" id="s-13-1"><div class="section-num"><span>§ 13.1</span></div><h2 class="section-title">Processus de décision</h2><ul class="bullets"><li>Identification du besoin — capacité, remplacement, expansion</li><li>Quantification — investissement initial, flux futurs, durée de vie</li><li>Évaluation économique — statique ou dynamique</li><li>Sélection de la source de financement — FP / FE / leasing</li><li>Mise en œuvre et suivi — écarts entre prévu et réalisé</li></ul></section><section class="section" id="s-13-2"><div class="section-num"><span>§ 13.2</span></div><h2 class="section-title">Méthodes statiques</h2><p>Les méthodes statiques ignorent la valeur temporelle de l'argent. Simples, elles offrent un premier filtre mais ne suffisent jamais à elles seules pour des projets de durée significative.</p><div class="formula"><div class="formula-cap"><span class="formula-label">Statique — I</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">Retour sur investissement (ROI)</div><div class="formula-eq">ROI = (Bénéfice annuel + intérêts) ÷ Investissement</div><div class="formula-legend"><span><b>ROI</b>Rendement annuel comptable</span></div></div><p class="muted">Exemple — Projet A : (23'600 + 8'400) / 120'000 × 100 = <strong style="color: var(--accent);">26.67 %</strong></p><div class="formula"><div class="formula-cap"><span class="formula-label">Statique — II</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">Délai de récupération (payback)</div><div class="formula-eq">DR = Investissement ÷ Cash-flow annuel moyen</div><div class="formula-legend"><span><b>DR</b>Nombre d'années pour récupérer</span></div></div><p class="muted">Seuil pratique courant : DR &lt; ½ de la durée de vie économique.</p></section><section class="section" id="s-13-3"><div class="section-num"><span>§ 13.3</span></div><h2 class="section-title">Méthodes dynamiques</h2><p>Les méthodes dynamiques actualisent les flux futurs à un taux d'actualisation reflétant le coût du capital. Elles seules permettent de comparer rigoureusement des projets de durées et profils différents.</p><div class="formula"><div class="formula-cap"><span class="formula-label">Dynamique — I</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">Valeur Actuelle Nette (VAN)</div><div class="formula-eq">VAN = Σ [Fₜ / (1+i)ᵗ] − Investissement initial</div><div class="formula-legend"><span><b>Fₜ</b>Flux net de l'année t</span><span><b>i</b>Taux d'actualisation (coût du capital)</span><span><b>VAN &gt; 0</b>Le projet crée de la valeur</span></div></div><div class="formula"><div class="formula-cap"><span class="formula-label">Dynamique — II</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">Taux Interne de Rentabilité (TIR)</div><div class="formula-eq">TIR = i tel que VAN(i) = 0</div><div class="formula-legend"><span><b>TIR &gt; i</b>Le projet est rentable</span><span><b>TIR &lt; i</b>Le projet détruit de la valeur</span></div></div><p class="muted">Recherche par interpolation linéaire entre 2 taux encadrants la VAN nulle.</p></section><section class="section" id="s-13-4"><div class="section-num"><span>§ 13.4</span><span class="tag">Projet A vs. B</span></div><h2 class="section-title">Comparaison sur cas concret</h2><p>Comparaison de deux projets sur 5 ans au taux d'actualisation de 12 %.</p><div class="compare"><div class="compare-side"><div class="head">Projet A — Invest. 240'000</div><div class="title">Flux concentrés en début</div><ul><li>Année 1-4 · Flux + 65'000</li><li>Année 5 · Flux + 25'000</li><li>VAN @ 12 % · + 28'760</li><li>TIR (estimé) · 13.6 %</li><li>ROI moyen · 26.67 %</li></ul></div><div class="compare-divider">vs</div><div class="compare-side"><div class="head">Projet B — Invest. 280'000</div><div class="title">Flux plus élevés mais décroissants</div><ul><li>Année 1-4 · Flux + 75'000</li><li>Année 5 · Flux + 10'000</li><li>VAN @ 12 % · + 16'720</li><li>TIR (estimé) · 12.9 %</li><li>ROI moyen · 39.63 %</li></ul></div></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Décision</div><div class="keyconcept-body">VAN A − VAN B = + 12'040 → <strong>projet A préférable</strong>, malgré un ROI moyen inférieur. La VAN intègre la valeur temporelle ; le ROI moyen non.</div></div><div class="callout attention"><div class="callout-label">Attention</div><div>Un ROI élevé peut masquer une faible VAN si les flux sont concentrés tard dans le temps. Toujours croiser méthodes statiques et dynamiques pour la décision finale.</div></div></section><section class="section" id="s-13-5"><div class="section-num"><span>§ 13.5</span></div><h2 class="section-title">Choix de la source de financement</h2><div class="dtable"><table><thead><tr><th>Source</th><th>Avantage</th><th>Inconvénient</th></tr></thead><tbody><tr><td>Autofinancement</td><td class="accent">Pas de coût explicite</td><td class="dim">Limité aux fonds disponibles</td></tr><tr><td>Emprunt bancaire</td><td class="accent">Effet de levier, intérêts déductibles</td><td class="dim">Caution &amp; risque d'illiquidité</td></tr><tr><td>Augmentation de capital</td><td class="accent">Renforce les FP</td><td class="dim">Dilution &amp; frais d'émission</td></tr><tr><td>Leasing</td><td class="accent">Pas d'apport, fiscalement attractif</td><td class="dim">Coût total plus élevé</td></tr></tbody></table></div></section></template>
<template id="tpl-ch14"><header><div class="chapter-meta"><span>Module XI · Analyse</span><span class="chapter-meta-divider"></span><span>Chapitre 14</span></div><h1 class="chapter-title"><span class="num">14</span>Analyse du bilan &amp; du résultat</h1><p class="chapter-lede">Ratios de structure, de rentabilité, de gestion — lire les comptes au-delà des chiffres.</p><div class="chapter-stats"><span><span class="dot">●</span> 18 min</span><span><span class="dot">●</span> 4 leçons</span><span><span class="dot">●</span> Avancé</span></div><div class="objectives"><div class="objectives-label">À l'issue de ce chapitre</div><div class="objectives-title">Vous saurez —</div><ol><li>Calculer les ratios fondamentaux de structure du bilan</li><li>Analyser la rentabilité par les ratios ROE, ROA, ROS</li><li>Évaluer la gestion par la rotation des stocks et créances</li><li>Construire une analyse synthétique multi-ratios</li></ol></div></header><section class="section" id="s-14-1"><div class="section-num"><span>§ 14.1</span></div><h2 class="section-title">Considérations générales</h2><p>L'analyse financière exploite les comptes annuels pour répondre à trois questions : l'entreprise est-elle <strong>solide</strong> (structure), est-elle <strong>rentable</strong> (résultat), est-elle <strong>efficace</strong> (gestion) ? Chaque famille de ratios éclaire une dimension.</p><div class="threeup"><div class="threeup-card"><div class="pre">Structure</div><div class="ttl">Solidité</div><div class="sub">Bilan</div></div><div class="threeup-card"><div class="pre">Rentabilité</div><div class="ttl">Performance</div><div class="sub">Compte de résultat</div></div><div class="threeup-card"><div class="pre">Gestion</div><div class="ttl">Efficacité</div><div class="sub">Activité — rotation</div></div></div></section><section class="section" id="s-14-2"><div class="section-num"><span>§ 14.2</span></div><h2 class="section-title">Ratios de structure</h2><div class="formula"><div class="formula-cap"><span class="formula-label">Structure — I</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">Degré de financement propre</div><div class="formula-eq">DF = Fonds propres ÷ Total bilan</div><div class="formula-legend"><span><b>≥ 30 %</b>Solidité satisfaisante</span><span><b>&lt; 20 %</b>Dépendance excessive aux tiers</span></div></div><div class="formula"><div class="formula-cap"><span class="formula-label">Structure — II</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">Liquidités 1 / 2 / 3</div><div class="formula-eq">L1 = Liq ÷ DCT · L2 = (Liq+Cr) ÷ DCT · L3 = AC ÷ DCT</div><div class="formula-legend"><span><b>L1 ≥ 0.3</b>Cash ratio — sécurité immédiate</span><span><b>L2 ≥ 1.0</b>Acid test</span><span><b>L3 ≥ 1.5</b>Liquidité générale</span></div></div></section><section class="section" id="s-14-3"><div class="section-num"><span>§ 14.3</span></div><h2 class="section-title">Ratios de rentabilité</h2><div class="formula"><div class="formula-cap"><span class="formula-label">Rentabilité — I</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">Return on Equity (ROE)</div><div class="formula-eq">ROE = Bénéfice net ÷ Fonds propres</div><div class="formula-legend"><span><b>ROE</b>Rendement pour l'actionnaire</span><span><b>Cible</b>≥ coût du capital propre</span></div></div><div class="formula"><div class="formula-cap"><span class="formula-label">Rentabilité — II</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">Return on Assets (ROA)</div><div class="formula-eq">ROA = EBIT ÷ Total actif</div><div class="formula-legend"><span><b>ROA</b>Rendement économique global</span></div></div><div class="formula"><div class="formula-cap"><span class="formula-label">Rentabilité — III</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">Marge nette (ROS)</div><div class="formula-eq">ROS = Bénéfice net ÷ Chiffre d'affaires</div><div class="formula-legend"><span><b>ROS</b>Capacité à transformer le CA en cash</span></div></div></section><section class="section" id="s-14-4"><div class="section-num"><span>§ 14.4</span></div><h2 class="section-title">Analyse de l'activité</h2><div class="dtable"><table><thead><tr><th>Ratio</th><th>Formule</th><th>Interprétation</th></tr></thead><tbody><tr><td>Rotation stocks</td><td>Coût ventes / Stock moyen</td><td class="dim">Plus c'est haut, mieux c'est</td></tr><tr><td>Durée moyenne stock</td><td>365 / Rotation</td><td class="dim">En jours — dépend du secteur</td></tr><tr><td>DSO — délai clients</td><td>Créances × 365 / CA TTC</td><td class="dim">Politique de crédit</td></tr><tr><td>DPO — délai fournisseurs</td><td>Fournisseurs × 365 / Achats</td><td class="dim">Crédit obtenu</td></tr><tr><td>BFR en jours de CA</td><td>BFR × 365 / CA</td><td class="dim">Tension de trésorerie</td></tr></tbody></table></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Cycle d'exploitation</div><div class="keyconcept-body">Cycle = durée stock + DSO − DPO. Un cycle court signifie que l'argent revient vite. Un <strong>cycle négatif</strong> (DPO &gt; stock + DSO) est typique des grands distributeurs : ils financent leur stock par leurs fournisseurs.</div></div></section></template>
<template id="tpl-ch15"><header><div class="chapter-meta"><span>Module XII · Capital</span><span class="chapter-meta-divider"></span><span>Chapitre 15</span></div><h1 class="chapter-title"><span class="num">15</span>Le financement</h1><p class="chapter-lede">Capital propre, capital social, financements étrangers — composer la structure du passif.</p><div class="chapter-stats"><span><span class="dot">●</span> 22 min</span><span><span class="dot">●</span> 4 leçons</span><span><span class="dot">●</span> Avancé</span></div><div class="objectives"><div class="objectives-label">À l'issue de ce chapitre</div><div class="objectives-title">Vous saurez —</div><ol><li>Distinguer capital propre et capital social</li><li>Identifier les modes de financement par fonds propres internes et externes</li><li>Comptabiliser un emprunt obligataire et un emprunt bancaire</li><li>Traiter une acquisition d'actions propres</li></ol></div></header><section class="section" id="s-15-1"><div class="section-num"><span>§ 15.1</span></div><h2 class="section-title">Capital propre &amp; capital social</h2><p>Le <strong>capital propre</strong> est la somme totale des ressources internes — capital social, réserves, bénéfices accumulés. Le <strong>capital social</strong> n'en est qu'une composante : la valeur nominale apportée par les actionnaires.</p><div class="compare"><div class="compare-side"><div class="head">Capital social</div><div class="title">Apports nominaux</div><ul><li>2800 Capital-actions / capital social</li><li>2820 Capital-participation</li><li>2810 Capital non libéré (correcteur)</li></ul></div><div class="compare-divider">+</div><div class="compare-side"><div class="head">Réserves &amp; résultats</div><div class="title">Accumulation interne</div><ul><li>2900 Réserve légale issue du capital</li><li>2950 Réserve légale issue du bénéfice</li><li>2960 Réserves facultatives</li><li>2970 Bénéfice / perte reporté</li><li>2979 Résultat de l'exercice</li></ul></div></div></section><section class="section" id="s-15-2"><div class="section-num"><span>§ 15.2</span></div><h2 class="section-title">Financement par fonds propres</h2><div class="dtable"><table><thead><tr><th>Mode</th><th>Origine</th><th>Effet FP</th></tr></thead><tbody><tr><td>Autofinancement</td><td>Bénéfices conservés</td><td class="accent">+ Réserves</td></tr><tr><td>Augmentation cap. ordinaire</td><td>Nouveaux apports en cash</td><td class="accent">+ Capital + Agio</td></tr><tr><td>Augmentation cap. en nature</td><td>Apports en nature (évaluation)</td><td class="accent">+ Capital</td></tr><tr><td>Émission gratuite (split)</td><td>Incorporation de réserves</td><td class="accent">Capital ↔ Réserves</td></tr><tr><td>Capital-participation</td><td>Bons de participation</td><td class="accent">+ Capital-participation</td></tr></tbody></table></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">L'agio d'émission</div><div class="keyconcept-body">Quand des actions nouvelles sont émises au-dessus de leur valeur nominale, la différence (agio) alimente la <strong>réserve légale issue du capital</strong> (compte 2900).</div></div><h3>Cas : 100 actions nominal 100, émission à 150</h3><div class="journal"><div class="journal-cap"><strong>Augmentation de capital avec agio</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">1020 Banque</td><td class="acct">2800 Capital-actions</td><td class="amount">10 000.00</td><td class="comment">Valeur nominale 100 × 100</td></tr><tr><td class="acct">1020 Banque</td><td class="acct">2900 Réserve légale (agio)</td><td class="amount">5 000.00</td><td class="comment">Agio 50 × 100</td></tr></tbody></table></div></section><section class="section" id="s-15-3"><div class="section-num"><span>§ 15.3</span></div><h2 class="section-title">Modes de financement étrangers</h2><div class="dtable"><table><thead><tr><th>Instrument</th><th>Durée</th><th>Compte passif</th></tr></thead><tbody><tr><td>Crédit fournisseur</td><td>30-90 j</td><td class="accent">2000</td></tr><tr><td>Crédit en compte courant</td><td>≤ 1 an</td><td class="accent">2100</td></tr><tr><td>Crédit d'investissement bancaire</td><td>3-10 ans</td><td class="accent">2451</td></tr><tr><td>Emprunt hypothécaire</td><td>10-25 ans</td><td class="accent">2450</td></tr><tr><td>Emprunt obligataire</td><td>5-15 ans</td><td class="accent">2430</td></tr><tr><td>Crédit-bail (leasing)</td><td>3-7 ans</td><td class="accent">2451</td></tr></tbody></table></div><h3>Émission d'un emprunt obligataire — 1'000 × 1'000 nominal</h3><div class="journal"><div class="journal-cap"><strong>Émission au pair</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">1020 Banque</td><td class="acct">2430 Emprunt obligataire</td><td class="amount">1 000 000.00</td><td class="comment">Émission au pair</td></tr></tbody></table></div><div class="journal"><div class="journal-cap"><strong>Paiement coupon annuel 3 %</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">6900 Intérêts-charges</td><td class="acct">1020 Banque</td><td class="amount">30 000.00</td><td class="comment">Coupon obligation 3 %</td></tr></tbody></table></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Effet de levier</div><div class="keyconcept-body">Tant que le <strong>ROA dépasse le taux d'intérêt après impôts</strong>, augmenter la dette améliore le ROE. Au-delà, l'effet s'inverse et devient destructeur de valeur (effet massue).</div></div></section><section class="section" id="s-15-4"><div class="section-num"><span>§ 15.4</span></div><h2 class="section-title">Acquisition d'actions propres</h2><p>Une société peut racheter ses propres actions dans la limite de <strong>10 % du capital-actions</strong>. Les actions propres figurent au bilan en poste négatif des fonds propres.</p><div class="journal"><div class="journal-cap"><strong>Rachat 50 actions propres à 180 (nominal 100)</strong></div><table><thead><tr><th>Débit</th><th>Crédit</th><th>Montant</th><th>Commentaire</th></tr></thead><tbody><tr><td class="acct">2850 Actions propres</td><td class="acct">1020 Banque</td><td class="amount">9 000.00</td><td class="comment">Acquisition actions propres (poste négatif des FP)</td></tr></tbody></table></div><div class="lawarticle"><div class="lawarticle-tag">Art. 659 CO<span class="ref">Code des obligations</span></div><div class="lawarticle-body">L'acquisition de propres actions n'est licite que si la société dispose de fonds propres librement disponibles équivalents à la valeur des actions concernées et que le total ne dépasse pas 10 % du capital-actions.</div></div></section></template>
<template id="tpl-ch16"><header><div class="chapter-meta"><span>Module XIII · Pilotage</span><span class="chapter-meta-divider"></span><span>Chapitre 16</span></div><h1 class="chapter-title"><span class="num">16</span>Techniques budgétaires &amp; Business plan</h1><p class="chapter-lede">Du budget annuel aux indicateurs de pilotage — anticiper et contrôler.</p><div class="chapter-stats"><span><span class="dot">●</span> 16 min</span><span><span class="dot">●</span> 3 leçons</span><span><span class="dot">●</span> Avancé</span></div><div class="objectives"><div class="objectives-label">À l'issue de ce chapitre</div><div class="objectives-title">Vous saurez —</div><ol><li>Construire un budget annuel articulé (ventes → résultat → trésorerie)</li><li>Élaborer un business plan structuré pour une demande de financement</li><li>Mettre en place un contrôle de gestion par écart</li><li>Choisir les indicateurs de pilotage adaptés au secteur</li></ol></div></header><section class="section" id="s-16-1"><div class="section-num"><span>§ 16.1</span></div><h2 class="section-title">Construction du budget annuel</h2><p>Le budget annuel décline les objectifs stratégiques en cibles chiffrées par activité, par centre de coûts et par période. Il sert de référence pour mesurer la performance et déclencher des actions correctrices.</p><ul class="bullets"><li>Budget des ventes — quantités × prix par segment</li><li>Budget de production — volumes, stocks cibles, capacités</li><li>Budget des achats — matières, sous-traitance, stocks</li><li>Budget des frais — personnel, structure, R&amp;D</li><li>Budget des investissements — CAPEX par projet</li><li>Budget de trésorerie — flux mensuels prévisionnels</li><li>Comptes prévisionnels — bilan, CR, flux consolidés</li></ul><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Bottom-up vs. Top-down</div><div class="keyconcept-body">L'approche <strong>bottom-up</strong> part des estimations des opérationnels (réaliste, mais conservateur). L'approche <strong>top-down</strong> impose les cibles direction (ambitieux, mais déconnecté). En pratique, les deux se croisent dans une itération négociée.</div></div></section><section class="section" id="s-16-2"><div class="section-num"><span>§ 16.2</span></div><h2 class="section-title">Business plan — structure type</h2><p>Un business plan structure la présentation d'un projet d'entreprise à des financeurs externes (banques, investisseurs). Il combine narration stratégique et chiffrage rigoureux.</p><div class="dtable"><table><thead><tr><th>Section</th><th>Contenu</th><th>Question clé</th></tr></thead><tbody><tr><td>1. Executive summary</td><td>Synthèse 1 page</td><td class="dim">Vaut-il la peine de lire la suite ?</td></tr><tr><td>2. Marché &amp; produit</td><td>Analyse demande, concurrence</td><td class="dim">Le besoin est-il réel ?</td></tr><tr><td>3. Modèle économique</td><td>Revenus, coûts, marges</td><td class="dim">Comment gagne-t-on de l'argent ?</td></tr><tr><td>4. Stratégie &amp; exécution</td><td>Go-to-market, ressources</td><td class="dim">Comment va-t-on y arriver ?</td></tr><tr><td>5. Équipe</td><td>Expérience, complémentarité</td><td class="dim">Sont-ils capables ?</td></tr><tr><td>6. Plan financier</td><td>CR 3-5 ans, bilan, trésorerie</td><td class="dim">Les chiffres tiennent-ils ?</td></tr><tr><td>7. Besoin de financement</td><td>Montant, usage, garanties</td><td class="dim">Combien et pour quoi ?</td></tr><tr><td>8. Risques</td><td>Scénarios, sensibilités</td><td class="dim">Que peut-il mal tourner ?</td></tr></tbody></table></div></section><section class="section" id="s-16-3"><div class="section-num"><span>§ 16.3</span></div><h2 class="section-title">Le contrôle de gestion</h2><p>Le contrôle de gestion compare en continu les réalisés aux prévus pour calculer des écarts et déclencher des actions correctrices. Le suivi est mensuel sur les postes critiques.</p><div class="formula"><div class="formula-cap"><span class="formula-label">Contrôle — I</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">Écart sur ventes</div><div class="formula-eq">ΔV = (Q_réel × P_réel) − (Q_prévu × P_prévu)</div><div class="formula-legend"><span><b>Δ quantité</b>(Q_réel − Q_prévu) × P_prévu</span><span><b>Δ prix</b>(P_réel − P_prévu) × Q_réel</span></div></div><p class="muted">Décomposition fondamentale : un écart de CA s'explique toujours par <strong>volume + prix</strong>.</p><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Tableau de bord</div><div class="keyconcept-body">Un bon tableau de bord limite les indicateurs à <strong>7 ± 2 par niveau de décision</strong>, mélange indicateurs financiers et opérationnels, et expose les tendances plutôt que les valeurs ponctuelles.</div></div></section></template>
<template id="tpl-ch17"><header><div class="chapter-meta"><span>Module XIV · Valorisation</span><span class="chapter-meta-divider"></span><span>Chapitre 17</span></div><h1 class="chapter-title"><span class="num">17</span>Évaluation d'entreprise</h1><p class="chapter-lede">Méthodes patrimoniales, méthodes de rendement, méthodes mixtes, DCF — combien vaut une entreprise ?</p><div class="chapter-stats"><span><span class="dot">●</span> 18 min</span><span><span class="dot">●</span> 3 leçons</span><span><span class="dot">●</span> Expert</span></div><div class="objectives"><div class="objectives-label">À l'issue de ce chapitre</div><div class="objectives-title">Vous saurez —</div><ol><li>Distinguer valeur substantielle, valeur de rendement et valeur de marché</li><li>Calculer une valeur patrimoniale corrigée (substance)</li><li>Appliquer la méthode des praticiens (mixte)</li><li>Mettre en œuvre une évaluation par les Discounted Cash Flows</li></ol></div></header><section class="section" id="s-17-1"><div class="section-num"><span>§ 17.1</span></div><h2 class="section-title">Approches traditionnelles</h2><p>L'évaluation d'entreprise mobilise des approches complémentaires — il n'existe pas une « vraie » valeur, mais une <strong>fourchette d'estimations</strong> dépendant de la perspective (vendeur, acheteur, fiscaliste, banquier).</p><div class="compare"><div class="compare-side"><div class="head">Patrimoniale</div><div class="title">Valeur substantielle</div><ul><li>Réévaluation actif par actif au prix du marché</li><li>− Dettes à valeur de remboursement</li><li>Idéal pour les sociétés immobilières</li></ul></div><div class="compare-divider">/</div><div class="compare-side"><div class="head">Rendement</div><div class="title">Valeur de rendement</div><ul><li>Bénéfice annuel normalisé × multiple</li><li>Capitalisation à un taux i</li><li>VR = Bénéfice ÷ i</li></ul></div></div></section><section class="section" id="s-17-2"><div class="section-num"><span>§ 17.2</span><span class="tag">Exemple guidé</span></div><h2 class="section-title">Cas — Évaluation par les trois méthodes</h2><p>Une PME de négoce affiche un bilan corrigé (substance) de 2'400'000 CHF et un bénéfice normalisé de 240'000 CHF. Taux de capitalisation retenu : 10 %.</p><div class="dtable"><div class="dtable-cap">PME exemple — évaluation triple</div><table><thead><tr><th>Ligne</th><th class="right">Valeur</th></tr></thead><tbody><tr><td>Valeur substantielle — patrimoniale</td><td class="right accent"></td></tr><tr><td>  Actif réévalué</td><td class="right accent">+ 3 100 000.−</td></tr><tr><td>  − Dettes corrigées</td><td class="right accent">− 700 000.−</td></tr><tr class="total"><td>  VS</td><td class="right accent">2 400 000.−</td></tr><tr><td>Valeur de rendement</td><td class="right accent"></td></tr><tr><td>  Bénéfice normalisé</td><td class="right accent">+ 240 000.−</td></tr><tr><td>  Taux capitalisation</td><td class="right accent">÷ 10 %</td></tr><tr class="total"><td>  VR</td><td class="right accent">2 400 000.−</td></tr><tr><td>Méthode mixte (1/3 + 2/3)</td><td class="right accent"></td></tr><tr><td>  1 × VS</td><td class="right accent">+ 2 400 000.−</td></tr><tr><td>  2 × VR</td><td class="right accent">+ 4 800 000.−</td></tr><tr><td>  Somme ÷ 3</td><td class="right accent">7 200 000 / 3</td></tr><tr class="total"><td>  VE</td><td class="right accent">2 400 000.−</td></tr></tbody></table></div><div class="callout tip"><div class="callout-label">Coïncidence</div><div>Dans ce cas VS = VR — situation atypique mais utile : elle montre que les trois méthodes convergent quand l'entreprise est rentable au coût de son capital.</div></div><div class="formula"><div class="formula-cap"><span class="formula-label">Praticiens — III</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">Méthode mixte suisse</div><div class="formula-eq">VE = (VS + 2 × VR) ÷ 3</div><div class="formula-legend"><span><b>VS</b>Valeur substantielle</span><span><b>VR</b>Valeur de re
