ndement</span><span><b>VE</b>Valeur d'entreprise</span></div></div><p class="muted">Pondération 1/3 substance + 2/3 rendement — recommandation traditionnelle de la pratique fiscale suisse.</p></section><section class="section" id="s-17-3"><div class="section-num"><span>§ 17.3</span></div><h2 class="section-title">Méthode DCF — Discounted Cash Flows</h2><p>La méthode DCF actualise les flux de trésorerie futurs prévisionnels au coût moyen pondéré du capital (WACC). Elle est devenue le <strong>standard international</strong> pour les évaluations de fusions-acquisitions et d'introductions en bourse.</p><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">WACC — coût moyen pondéré</div><div class="keyconcept-body">WACC = (E/V × kE) + (D/V × kD × (1−t)). Il combine coût des fonds propres (kE — souvent CAPM) et coût de la dette (kD net d'impôts), pondéré par leur poids dans la structure financière.</div></div><div class="formula"><div class="formula-cap"><span class="formula-label">DCF — I</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">Valeur d'entreprise (EV)</div><div class="formula-eq">EV = Σ [CFₜ / (1+WACC)ᵗ] + VT / (1+WACC)ⁿ</div><div class="formula-legend"><span><b>CFₜ</b>Free cash-flow année t</span><span><b>WACC</b>Coût moyen pondéré du capital</span><span><b>VT</b>Valeur terminale (Gordon-Shapiro)</span></div></div><div class="formula"><div class="formula-cap"><span class="formula-label">DCF — II</span><span class="formula-sigil">ƒ</span></div><div class="formula-title">Valeur terminale (Gordon-Shapiro)</div><div class="formula-eq">VT = CFₙ₊₁ ÷ (WACC − g)</div><div class="formula-legend"><span><b>g</b>Taux de croissance perpétuel (≤ inflation LT)</span><span><b>Cible g</b>1 à 2 % typique</span></div></div></section></template>
<template id="tpl-chA"><header><div class="chapter-meta"><span>Annexe · Référence</span><span class="chapter-meta-divider"></span><span>Chapitre A</span></div><h1 class="chapter-title"><span class="num">0A</span>Lexique comptable suisse</h1><p class="chapter-lede">Trente-sept termes essentiels pour parler la langue de la comptabilité — de Actif à Virement.</p><div class="chapter-stats"><span><span class="dot">●</span> Référence</span><span><span class="dot">●</span> 37 leçons</span><span><span class="dot">●</span> Référence</span></div><div class="objectives"><div class="objectives-label">À l'issue de ce chapitre</div><div class="objectives-title">Vous saurez —</div><ol><li>Disposer d'une définition opérationnelle pour chaque concept clé du cours</li><li>Retrouver rapidement la terminologie suisse (CO, CHF, AFC)</li><li>Distinguer les termes proches : actif / avoir, créance / dette, charge / produit</li><li>Servir d'outil de révision pour l'examen final</li></ol></div></header><section class="section" id="s-A-1"><div class="section-num"><span>§ A.1</span></div><h2 class="section-title">A · B · C</h2><div class="lex"><div class="lex-letter">A</div><div class="lex-entry"><div class="lex-term">Actif</div><div class="lex-def">Ensemble des biens et droits que possède l'entreprise. Présenté dans la moitié gauche du bilan, classé par liquidité croissante.</div></div><div class="lex-entry"><div class="lex-term">Actif circulant</div><div class="lex-def">Éléments de l'actif destinés à ne pas rester durablement dans l'entreprise — moins d'une année. Comprend les liquidités, créances, stocks et actifs de régularisation.</div></div><div class="lex-entry"><div class="lex-term">Amortissement</div><div class="lex-def">Diminution comptable de la valeur d'un actif immobilisé, étalée sur sa durée d'utilisation. Charge non monétaire au sens du CO 960a.</div></div><div class="lex-entry"><div class="lex-term">Avoir</div><div class="lex-def">Solde positif d'un compte en faveur de l'entreprise (ex : avoir en banque, avoir fiscal). Ne pas confondre avec « actif ».</div></div><div class="lex-letter">B</div><div class="lex-entry"><div class="lex-term">Bilan</div><div class="lex-def">Document de synthèse présentant à une date donnée le patrimoine (actif) et son financement (passif). Structure minimale fixée par l'art. 959a CO.</div></div><div class="lex-entry"><div class="lex-term">Budget</div><div class="lex-def">Prévision chiffrée des activités d'une période, déclinée par fonction et par mois. Référence du contrôle de gestion.</div></div><div class="lex-entry"><div class="lex-term">Bénéfice net</div><div class="lex-def">Solde positif du compte de résultat après impôts directs (compte 9200). Augmente les fonds propres.</div></div><div class="lex-letter">C</div><div class="lex-entry"><div class="lex-term">Capital propre</div><div class="lex-def">Fortune nette de l'entreprise — capital social, réserves, bénéfices reportés. Synonyme de fonds propres.</div></div><div class="lex-entry"><div class="lex-term">Charges</div><div class="lex-def">Diminutions de fonds propres résultant de l'activité (matières, salaires, intérêts). Inscrites dans les classes 4 à 8.</div></div><div class="lex-entry"><div class="lex-term">Crédit</div><div class="lex-def">Inscription dans la colonne droite d'un compte. Augmente les passifs et produits, diminue les actifs et charges. À ne pas confondre avec le crédit bancaire.</div></div><div class="lex-entry"><div class="lex-term">Clôture de l'exercice</div><div class="lex-def">Processus comptable de fin d'année : inventaires, régularisations, amortissements, provisions, détermination du résultat et établissement des comptes annuels.</div></div></div></section><section class="section" id="s-A-2"><div class="section-num"><span>§ A.2</span></div><h2 class="section-title">D · E · F</h2><div class="lex"><div class="lex-letter">D</div><div class="lex-entry"><div class="lex-term">Débit</div><div class="lex-def">Inscription dans la colonne gauche d'un compte. Augmente les actifs et charges, diminue les passifs et produits.</div></div><div class="lex-entry"><div class="lex-term">Dotation aux amortissements</div><div class="lex-def">Charge enregistrée pour l'exercice au titre de l'amortissement d'un actif (compte 6800). Voir Amortissement.</div></div><div class="lex-entry"><div class="lex-term">Dette</div><div class="lex-def">Obligation à payer envers un tiers — fournisseur, banque, État. Classée dans le passif par exigibilité croissante.</div></div><div class="lex-letter">E</div><div class="lex-entry"><div class="lex-term">Exercice comptable</div><div class="lex-def">Période de référence pour l'établissement des comptes, en général 12 mois (CO art. 957a). Plus courte ou plus longue en première et dernière année.</div></div><div class="lex-entry"><div class="lex-term">Emprunt</div><div class="lex-def">Mise à disposition de fonds par un tiers (banque, marché obligataire), remboursable avec intérêts. Comptes 2400-2451 selon nature et durée.</div></div><div class="lex-entry"><div class="lex-term">État financier</div><div class="lex-def">Document de synthèse présenté en clôture : bilan, compte de résultat, tableau de flux de trésorerie, annexe. Forme et contenu réglés par les art. 958 et suivants CO.</div></div><div class="lex-letter">F</div><div class="lex-entry"><div class="lex-term">Fonds de roulement net</div><div class="lex-def">Excédent des ressources stables (fonds propres + dettes LT) sur les actifs immobilisés. Mesure la marge de sécurité financière. FR = Ressources stables − Emplois stables.</div></div><div class="lex-entry"><div class="lex-term">Flux de trésorerie</div><div class="lex-def">Variation de la trésorerie pendant un exercice, ventilée en trois activités : exploitation, investissement, financement (cf. Chapitre 12).</div></div><div class="lex-entry"><div class="lex-term">Fournisseur</div><div class="lex-def">Tiers ayant livré des biens ou services et envers qui l'entreprise a contracté une dette commerciale. Compte 2000.</div></div></div></section><section class="section" id="s-A-3"><div class="section-num"><span>§ A.3</span></div><h2 class="section-title">G · I · L</h2><div class="lex"><div class="lex-letter">G</div><div class="lex-entry"><div class="lex-term">Grand livre</div><div class="lex-def">Recueil de tous les comptes ouverts par l'entreprise, dans lesquels sont reportées les écritures du journal. Pivot du système comptable en partie double.</div></div><div class="lex-entry"><div class="lex-term">Gestion de trésorerie</div><div class="lex-def">Pilotage des liquidités à court terme — prévisions, placements des excédents, financement des déficits. Distincte du flux de trésorerie qui est rétrospectif.</div></div><div class="lex-letter">I</div><div class="lex-entry"><div class="lex-term">Immobilisation</div><div class="lex-def">Actif destiné à servir durablement à l'activité (&gt; 1 an) : machines, immeubles, brevets, participations. Classes 14-17 du plan comptable PME suisse.</div></div><div class="lex-entry"><div class="lex-term">Inventaire</div><div class="lex-def">Relevé détaillé et complet à une date donnée de la nature, du nombre et de la valeur du patrimoine et des dettes. Le bilan en est le résumé synthétique.</div></div><div class="lex-letter">L</div><div class="lex-entry"><div class="lex-term">Liquidité</div><div class="lex-def">Capacité d'un actif à être transformé rapidement en argent sans perte de valeur. Hiérarchisée en degrés 1 (cash), 2 (acid test), 3 (liquidité générale).</div></div><div class="lex-entry"><div class="lex-term">Leasing</div><div class="lex-def">Contrat par lequel un bailleur met un bien à disposition contre redevances. Deux types : exploitation (operating) ou financier — distinction matérielle, pas formelle.</div></div></div></section><section class="section" id="s-A-4"><div class="section-num"><span>§ A.4</span></div><h2 class="section-title">P</h2><div class="lex"><div class="lex-letter">P</div><div class="lex-entry"><div class="lex-term">Passif</div><div class="lex-def">Origine des ressources qui financent l'actif. Comprend les fonds étrangers (CT et LT) et les fonds propres. Classé par exigibilité croissante.</div></div><div class="lex-entry"><div class="lex-term">Produits</div><div class="lex-def">Augmentations de fonds propres résultant de l'activité — ventes, prestations, produits financiers, dissolutions de provisions. Classes 3 et 6-8 selon nature.</div></div><div class="lex-entry"><div class="lex-term">Provision</div><div class="lex-def">Charge inscrite pour faire face à une obligation future probable dont le montant et l'échéance ne sont qu'estimés (CO art. 960e). Voir Chapitre 03.</div></div><div class="lex-entry"><div class="lex-term">Plan comptable</div><div class="lex-def">Cadre normalisé de comptes utilisés par l'entreprise. La référence pratique en Suisse est le Plan PME Sterchi/Mattle — voir Annexe B.</div></div></div></section><section class="section" id="s-A-5"><div class="section-num"><span>§ A.5</span></div><h2 class="section-title">R · T</h2><div class="lex"><div class="lex-letter">R</div><div class="lex-entry"><div class="lex-term">Ratio</div><div class="lex-def">Rapport entre deux grandeurs des comptes annuels, utilisé pour mesurer la structure, la rentabilité ou la gestion. Voir Chapitre 14 pour les ratios fondamentaux.</div></div><div class="lex-entry"><div class="lex-term">Résultat net</div><div class="lex-def">Bénéfice ou perte de l'exercice — solde final du compte de résultat après impôts directs (compte 9200). Synonyme de bénéfice net.</div></div><div class="lex-entry"><div class="lex-term">Régularisation</div><div class="lex-def">Écriture de fin d'exercice qui rattache une charge ou un produit à la période concernée. Quatre cas : charges payées d'avance, charges à payer, produits constatés d'avance, produits à recevoir.</div></div><div class="lex-letter">T</div><div class="lex-entry"><div class="lex-term">TVA suisse</div><div class="lex-def">Impôt fédéral indirect sur la consommation. Taux normal 8.1 % · taux réduit 2.6 % (alimentation, livres, médicaments) · taux hébergement 3.8 % (nuitées). En vigueur depuis 2024 (réforme AVS 21).</div></div><div class="lex-entry"><div class="lex-term">Trésorerie</div><div class="lex-def">Disponibilités immédiates de l'entreprise — caisse, postes courants, banques. Comptes 1000-1020. Cœur de la liquidité.</div></div><div class="lex-entry"><div class="lex-term">Tableau de bord</div><div class="lex-def">Synthèse d'indicateurs clés (financiers et opérationnels) destinée au pilotage. Doit limiter le nombre d'indicateurs à 7 ± 2 par niveau de décision.</div></div></div><div class="callout tip"><div class="callout-label">Astuce mémo</div><div>Pour mémoriser plus facilement la distinction débit / crédit, retenez : au débit ce qui « entre », au crédit ce qui « sort ». Cette règle s'inverse selon que le compte est d'actif ou de passif — d'où la partie double.</div></div></section><section class="section" id="s-A-6"><div class="section-num"><span>§ A.6</span></div><h2 class="section-title">V</h2><div class="lex"><div class="lex-letter">V</div><div class="lex-entry"><div class="lex-term">Valeur nette comptable (VNC)</div><div class="lex-def">Valeur d'acquisition d'un actif diminuée des amortissements cumulés. VNC = Coût d'acquisition − Amortissements.</div></div><div class="lex-entry"><div class="lex-term">Virement</div><div class="lex-def">Transfert de fonds d'un compte à un autre, généralement entre comptes bancaires ou postaux. Pièce justificative essentielle du journal.</div></div></div></section></template>
<template id="tpl-chB"><header><div class="chapter-meta"><span>Annexe · Référence</span><span class="chapter-meta-divider"></span><span>Chapitre B</span></div><h1 class="chapter-title"><span class="num">0B</span>Plan comptable PME suisse</h1><p class="chapter-lede">Version officielle de référence — Sterchi, Mattle, Helbling — Loisirs et Pédagogie S.A., 2014.</p><div class="chapter-stats"><span><span class="dot">●</span> Référence</span><span><span class="dot">●</span> 9 leçons</span><span><span class="dot">●</span> Référence</span></div><div class="objectives"><div class="objectives-label">À l'issue de ce chapitre</div><div class="objectives-title">Vous saurez —</div><ol><li>Identifier la classe d'un compte d'après son premier chiffre</li><li>Distinguer comptes de bilan (1-2) et comptes de gestion (3-8)</li><li>Reconnaître les principaux comptes de la pratique suisse PME</li><li>Sourcer correctement les libellés selon le plan officiel</li></ol></div></header><section class="section" id="s-B-0"><div class="section-num"><span>§ B.0</span></div><h2 class="section-title">Présentation du plan</h2><p>Cette annexe reproduit l'intégralité du plan comptable suisse PME — version officielle de référence publiée par Walter Sterchi, Herbert Mattle et Markus Helbling aux éditions LEP (Loisirs et Pédagogie S.A.) en 2014. C'est le plan adopté par les écoles professionnelles suisses, les fiduciaires et la grande majorité des PME du pays.</p><div class="threeup"><div class="threeup-card"><div class="pre">Classes 1-2</div><div class="ttl">Bilan</div><div class="sub">Actif &amp; Passif</div></div><div class="threeup-card"><div class="pre">Classes 3-8</div><div class="ttl">Résultat</div><div class="sub">Charges &amp; Produits</div></div><div class="threeup-card"><div class="pre">Classe 9</div><div class="ttl">Clôture</div><div class="sub">Compte de résultat</div></div></div><div class="callout note"><div class="callout-label">Source</div><div>Référence bibliographique : Sterchi W., Mattle H., Helbling M. — Plan comptable suisse PME — version officielle de référence, Éditions Loisirs et Pédagogie S.A. (LEP), Le Mont-sur-Lausanne, 2014.</div></div><div class="lawarticle"><div class="lawarticle-tag">Art. 957a CO<span class="ref">Code des obligations</span></div><div class="lawarticle-body">La comptabilité constitue la base de l'établissement des comptes. Elle enregistre les transactions et les autres faits nécessaires à la présentation du patrimoine, de la situation financière et des résultats de l'entreprise.</div></div></section><section class="section" id="s-B-1"><div class="section-num"><span>§ B.1</span><span class="tag">Bilan · Actif</span></div><h2 class="section-title">Classe 1 — Actifs</h2><p class="muted">Les actifs circulants (groupe 10) ne restent pas durablement dans l'entreprise (≤ 1 an). Les actifs immobilisés (groupe 14) y restent au-delà d'un an.</p><div class="plan-section"><div class="plan-section-head"><span>10 · Actifs circulants</span><span>≤ 1 an</span></div><div class="plan-row group"><div class="pl-no">100</div><div class="pl-name">Liquidités</div></div><div class="plan-row"><div class="pl-no">1000</div><div class="pl-name">Caisse</div></div><div class="plan-row"><div class="pl-no">1020</div><div class="pl-name">Banque (avoir)</div></div><div class="plan-row group"><div class="pl-no">106</div><div class="pl-name">Avoirs à court terme cotés en bourse</div></div><div class="plan-row"><div class="pl-no">1060</div><div class="pl-name">Titres</div></div><div class="plan-row"><div class="pl-no">1069</div><div class="pl-name">Ajustement de la valeur des titres</div></div><div class="plan-row group"><div class="pl-no">110</div><div class="pl-name">Créances résultant de livraisons et prestations</div></div><div class="plan-row"><div class="pl-no">1100</div><div class="pl-name">Créances provenant de livraisons et de prestations (Débiteurs)</div></div><div class="plan-row"><div class="pl-no">1109</div><div class="pl-name">Ducroire</div></div><div class="plan-row"><div class="pl-no">1110</div><div class="pl-name">Créances rés. de livr. et prest. envers les sociétés du groupe</div></div><div class="plan-row group"><div class="pl-no">114</div><div class="pl-name">Autres créances à court terme</div></div><div class="plan-row"><div class="pl-no">1140</div><div class="pl-name">Avances et prêts</div></div><div class="plan-row"><div class="pl-no">1149</div><div class="pl-name">Ajustement de la valeur des avances et des prêts</div></div><div class="plan-row"><div class="pl-no">1170</div><div class="pl-name">Impôt préalable : TVA s/matériel, marchandises, prestations, énergie</div></div><div class="plan-row"><div class="pl-no">1171</div><div class="pl-name">Impôt préalable : TVA s/investissements et autres charges d'exploitation</div></div><div class="plan-row"><div class="pl-no">1176</div><div class="pl-name">Impôt anticipé</div></div><div class="plan-row"><div class="pl-no">1180</div><div class="pl-name">Créances envers les assurances sociales et institutions de prévoyance</div></div><div class="plan-row"><div class="pl-no">1189</div><div class="pl-name">Impôt à la source</div></div><div class="plan-row"><div class="pl-no">1190</div><div class="pl-name">Autres créances à court terme</div></div><div class="plan-row"><div class="pl-no">1199</div><div class="pl-name">Ajustement de la valeur des créances à court terme</div></div><div class="plan-row group"><div class="pl-no">120</div><div class="pl-name">Stocks et prestations non facturées</div></div><div class="plan-row"><div class="pl-no">1200</div><div class="pl-name">Marchandises commerciales</div></div><div class="plan-row"><div class="pl-no">1210</div><div class="pl-name">Matières premières</div></div><div class="plan-row"><div class="pl-no">1220</div><div class="pl-name">Matières auxiliaires</div></div><div class="plan-row"><div class="pl-no">1230</div><div class="pl-name">Matières consommables</div></div><div class="plan-row"><div class="pl-no">1250</div><div class="pl-name">Marchandises en consignation</div></div><div class="plan-row"><div class="pl-no">1260</div><div class="pl-name">Stocks de produits finis</div></div><div class="plan-row"><div class="pl-no">1280</div><div class="pl-name">Travaux en cours</div></div><div class="plan-row group"><div class="pl-no">130</div><div class="pl-name">Compte de régularisation de l'actif</div></div><div class="plan-row"><div class="pl-no">1300</div><div class="pl-name">Charges payées d'avance</div></div><div class="plan-row"><div class="pl-no">1301</div><div class="pl-name">Produits à recevoir</div></div></div><div class="plan-section"><div class="plan-section-head"><span>14 · Actifs immobilisés</span><span>&gt; 1 an</span></div><div class="plan-row group"><div class="pl-no">140</div><div class="pl-name">Immobilisations financières</div></div><div class="plan-row"><div class="pl-no">1400</div><div class="pl-name">Titres à long terme</div></div><div class="plan-row"><div class="pl-no">1409</div><div class="pl-name">Ajustement de la valeur des titres</div></div><div class="plan-row"><div class="pl-no">1440</div><div class="pl-name">Prêts</div></div><div class="plan-row"><div class="pl-no">1441</div><div class="pl-name">Hypothèques</div></div><div class="plan-row"><div class="pl-no">1449</div><div class="pl-name">Ajustement de la valeur des créances à long terme</div></div><div class="plan-row group"><div class="pl-no">148</div><div class="pl-name">Participations</div></div><div class="plan-row"><div class="pl-no">1480</div><div class="pl-name">Participations</div></div><div class="plan-row"><div class="pl-no">1489</div><div class="pl-name">Ajustement de la valeur des participations</div></div><div class="plan-row group"><div class="pl-no">150</div><div class="pl-name">Immobilisations corporelles meubles</div></div><div class="plan-row"><div class="pl-no">1500</div><div class="pl-name">Machines et appareils</div></div><div class="plan-row"><div class="pl-no">1509</div><div class="pl-name">Ajustement de la valeur des machines et appareils</div></div><div class="plan-row"><div class="pl-no">1510</div><div class="pl-name">Mobilier et installations</div></div><div class="plan-row"><div class="pl-no">1519</div><div class="pl-name">Ajustement de la valeur du mobilier et des installations</div></div><div class="plan-row"><div class="pl-no">1520</div><div class="pl-name">Machines de bureau, informatique, systèmes de communication</div></div><div class="plan-row"><div class="pl-no">1529</div><div class="pl-name">Ajustement de la valeur des machines de bureau, inf. et syst. comm.</div></div><div class="plan-row"><div class="pl-no">1530</div><div class="pl-name">Véhicules</div></div><div class="plan-row"><div class="pl-no">1539</div><div class="pl-name">Ajustement de la valeur des véhicules</div></div><div class="plan-row"><div class="pl-no">1540</div><div class="pl-name">Outillages et appareils</div></div><div class="plan-row"><div class="pl-no">1549</div><div class="pl-name">Ajustement de la valeur des outillages et appareils</div></div><div class="plan-row group"><div class="pl-no">160</div><div class="pl-name">Immobilisations corporelles immeubles</div></div><div class="plan-row"><div class="pl-no">1600</div><div class="pl-name">Immeubles d'exploitation</div></div><div class="plan-row"><div class="pl-no">1609</div><div class="pl-name">Ajustement de la valeur des immeubles d'exploitation</div></div><div class="plan-row group"><div class="pl-no">170</div><div class="pl-name">Immobilisations incorporelles</div></div><div class="plan-row"><div class="pl-no">1700</div><div class="pl-name">Brevets, know-how, licences, droits, développement</div></div><div class="plan-row"><div class="pl-no">1709</div><div class="pl-name">Ajustement de la valeur des brevets, know-how, licences, droits, dév.</div></div><div class="plan-row"><div class="pl-no">1770</div><div class="pl-name">Goodwill</div></div><div class="plan-row"><div class="pl-no">1779</div><div class="pl-name">Ajustement de la valeur des goodwill</div></div><div class="plan-row group"><div class="pl-no">180</div><div class="pl-name">Capital non versé</div></div><div class="plan-row"><div class="pl-no">1850</div><div class="pl-name">Capital actions, social, droits de participations ou de fondation non versés</div></div></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Convention « ...9 » des comptes correcteurs</div><div class="keyconcept-body">Tout compte se terminant par 9 dans la classe 1 est un compte correcteur d'actif : il vient en déduction du compte qu'il corrige (ex : 1109 Ducroire corrige 1100 Créances). Les comptes correcteurs ont un solde créditeur — ce sont des <strong>« actifs négatifs »</strong>.</div></div></section><section class="section" id="s-B-2"><div class="section-num"><span>§ B.2</span><span class="tag">Bilan · Passif</span></div><h2 class="section-title">Classe 2 — Passif</h2><p class="muted">Le passif distingue dettes à court terme (groupe 20), dettes à long terme (24), et fonds propres (28). L'exigibilité décroît du haut vers le bas.</p><div class="plan-section"><div class="plan-section-head"><span>20 · Dettes à court terme</span><span>≤ 1 an</span></div><div class="plan-row group"><div class="pl-no">200</div><div class="pl-name">Dettes à court terme résultant d'achats et de prestations de services</div></div><div class="plan-row"><div class="pl-no">2000</div><div class="pl-name">Dettes résultant d'achats et de prestations de services (Créanciers)</div></div><div class="plan-row"><div class="pl-no">2030</div><div class="pl-name">Acomptes de clients</div></div><div class="plan-row"><div class="pl-no">2050</div><div class="pl-name">Dettes envers des sociétés du groupe</div></div><div class="plan-row group"><div class="pl-no">210</div><div class="pl-name">Dettes à court terme rémunérées</div></div><div class="plan-row"><div class="pl-no">2100</div><div class="pl-name">Dettes bancaires</div></div><div class="plan-row"><div class="pl-no">2120</div><div class="pl-name">Engagements de financement par leasing</div></div><div class="plan-row"><div class="pl-no">2140</div><div class="pl-name">Autres dettes à court terme rémunérées</div></div><div class="plan-row group"><div class="pl-no">220</div><div class="pl-name">Autres dettes à court terme</div></div><div class="plan-row"><div class="pl-no">2200</div><div class="pl-name">TVA due</div></div><div class="plan-row"><div class="pl-no">2201</div><div class="pl-name">Décompte TVA</div></div><div class="plan-row"><div class="pl-no">2206</div><div class="pl-name">Impôt anticipé dû</div></div><div class="plan-row"><div class="pl-no">2208</div><div class="pl-name">Impôts directs</div></div><div class="plan-row"><div class="pl-no">2210</div><div class="pl-name">Autres dettes à court terme</div></div><div class="plan-row"><div class="pl-no">2261</div><div class="pl-name">Dividendes</div></div><div class="plan-row"><div class="pl-no">2270</div><div class="pl-name">Assurances sociales et institutions de prévoyance</div></div><div class="plan-row"><div class="pl-no">2279</div><div class="pl-name">Impôt à la source</div></div><div class="plan-row group"><div class="pl-no">230</div><div class="pl-name">Passifs de régularisation et provisions à court terme</div></div><div class="plan-row"><div class="pl-no">2300</div><div class="pl-name">Charges à payer</div></div><div class="plan-row"><div class="pl-no">2301</div><div class="pl-name">Produits encaissés d'avance</div></div><div class="plan-row"><div class="pl-no">2330</div><div class="pl-name">Provisions à court terme</div></div></div><div class="plan-section"><div class="plan-section-head"><span>24 · Dettes à long terme</span><span>&gt; 1 an</span></div><div class="plan-row group"><div class="pl-no">240</div><div class="pl-name">Dettes à long terme rémunérées</div></div><div class="plan-row"><div class="pl-no">2400</div><div class="pl-name">Dettes bancaires</div></div><div class="plan-row"><div class="pl-no">2420</div><div class="pl-name">Engagements de financement par leasing</div></div><div class="plan-row"><div class="pl-no">2430</div><div class="pl-name">Emprunts obligataires</div></div><div class="plan-row"><div class="pl-no">2450</div><div class="pl-name">Emprunts</div></div><div class="plan-row"><div class="pl-no">2451</div><div class="pl-name">Hypothèques</div></div><div class="plan-row group"><div class="pl-no">250</div><div class="pl-name">Autres dettes à long terme</div></div><div class="plan-row"><div class="pl-no">2500</div><div class="pl-name">Autres dettes à long terme</div></div><div class="plan-row group"><div class="pl-no">260</div><div class="pl-name">Provisions à long terme et provisions légales</div></div><div class="plan-row"><div class="pl-no">2600</div><div class="pl-name">Provisions</div></div></div><div class="plan-section"><div class="plan-section-head"><span>28 · Fonds propres (personnes morales)</span><span>Non exigibles</span></div><div class="plan-row group"><div class="pl-no">280</div><div class="pl-name">Capital social ou capital de fondation</div></div><div class="plan-row"><div class="pl-no">2800</div><div class="pl-name">Capital-actions, capital social, capital de fondation</div></div><div class="plan-row group"><div class="pl-no">290</div><div class="pl-name">Réserves / bénéfices et pertes</div></div><div class="plan-row"><div class="pl-no">2900</div><div class="pl-name">Réserves légales issues du capital</div></div><div class="plan-row"><div class="pl-no">2930</div><div class="pl-name">Réserves sur participations propres au capital</div></div><div class="plan-row"><div class="pl-no">2940</div><div class="pl-name">Réserves d'évaluation</div></div><div class="plan-row"><div class="pl-no">2950</div><div class="pl-name">Réserves légales issues du bénéfice</div></div><div class="plan-row"><div class="pl-no">2960</div><div class="pl-name">Réserves libres</div></div><div class="plan-row"><div class="pl-no">2970</div><div class="pl-name">Bénéfice / perte reporté</div></div><div class="plan-row"><div class="pl-no">2979</div><div class="pl-name">Bénéfice / perte de l'exercice</div></div><div class="plan-row"><div class="pl-no">2980</div><div class="pl-name">Propres actions, parts sociales, droits de participations (poste négatif)</div></div></div><div class="compare"><div class="compare-side"><div class="head">RI</div><div class="title">Capital propre raison individuelle</div><ul><li>2800 Capital propre en début d'exercice</li><li>2820 Apports / prélèvements sur capital</li><li>2850 Compte privé</li><li>2891 Bénéfice / perte de l'exercice</li></ul></div><div class="compare-divider">≷</div><div class="compare-side"><div class="head">SP</div><div class="title">Capital propre sociétés de personnes</div><ul><li>2800 Capital, associé A en début d'exercice</li><li>2810 Apports / prélèvements associé A</li><li>2820 Compte privé associé A</li><li>2831 Bénéfice / perte associé A</li></ul></div></div></section><section class="section" id="s-B-3"><div class="section-num"><span>§ B.3</span><span class="tag">Résultat · Produits</span></div><h2 class="section-title">Classe 3 — Chiffre d'affaires</h2><p class="muted">La classe 3 regroupe l'ensemble du chiffre d'affaires résultant des ventes et des prestations de services. Les variations de stocks (3900-3940) sont également comptabilisées ici.</p><div class="dtable"><table><thead><tr><th>Compte</th><th>Libellé</th><th>Nature</th></tr></thead><tbody><tr><td>3000</td><td>Ventes de produits fabriqués</td><td class="dim">Produit</td></tr><tr><td>3200</td><td>Ventes de marchandises</td><td class="dim">Produit</td></tr><tr><td>3400</td><td>Ventes de prestations</td><td class="dim">Produit</td></tr><tr><td>3600</td><td>Autres ventes et prestations de services</td><td class="dim">Produit</td></tr><tr><td>3700</td><td>Prestations propres</td><td class="dim">Produit</td></tr><tr><td>3710</td><td>Consommations propres</td><td class="dim">Produit</td></tr><tr><td>3800</td><td>Déductions sur ventes</td><td class="dim">Charge</td></tr><tr><td>3805</td><td>Pertes sur clients, variation du ducroire</td><td class="dim">Charge</td></tr><tr><td>3900</td><td>Variation des stocks de produits semi-finis</td><td class="dim">Produit / Charge</td></tr><tr><td>3901</td><td>Variation des stocks de produits finis</td><td class="dim">Produit / Charge</td></tr><tr><td>3940</td><td>Variation de la valeur des prestations non facturées</td><td class="dim">Produit / Charge</td></tr></tbody></table></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Comptes 38xx : pourquoi des « produits » à débit ?</div><div class="keyconcept-body">Les comptes 3800 (déductions sur ventes) et 3805 (pertes sur clients) sont des <strong>réducteurs de produits</strong> : ils enregistrent au débit ce qui vient en diminution du chiffre d'affaires brut, donnant ainsi le CA net.</div></div></section><section class="section" id="s-B-4"><div class="section-num"><span>§ B.4</span><span class="tag">Résultat · Charges</span></div><h2 class="section-title">Classe 4 — Charges de matériel &amp; marchandises</h2><p class="muted">La classe 4 comprend toutes les charges directes liées aux matières, marchandises et prestations de tiers — l'« input » de l'exploitation.</p><div class="dtable"><table><thead><tr><th>Compte</th><th>Libellé</th><th>Nature</th></tr></thead><tbody><tr><td>4000</td><td>Charges de matériel de l'atelier</td><td class="dim">Charge</td></tr><tr><td>4200</td><td>Achats de marchandises destinées à la revente</td><td class="dim">Charge</td></tr><tr><td>4400</td><td>Prestations / travaux de tiers</td><td class="dim">Charge</td></tr><tr><td>4500</td><td>Charges d'énergie pour l'exploitation</td><td class="dim">Charge</td></tr><tr><td>4900</td><td>Déductions sur les charges</td><td class="dim">Produit</td></tr></tbody></table></div><div class="callout tip"><div class="callout-label">Marge brute</div><div>Chiffre d'affaires (Cl. 3) − Charges matières (Cl. 4) = <strong>Bénéfice brut</strong> (marge brute). C'est le premier solde intermédiaire de gestion, base de la rentabilité commerciale.</div></div></section><section class="section" id="s-B-5"><div class="section-num"><span>§ B.5</span><span class="tag">Résultat · Charges</span></div><h2 class="section-title">Classe 5 — Charges de personnel</h2><p class="muted">La classe 5 isole toutes les charges de personnel — salaires, charges sociales, frais accessoires. Sa lecture éclaire la productivité de l'entreprise.</p><div class="dtable"><table><thead><tr><th>Compte</th><th>Libellé</th><th>Nature</th></tr></thead><tbody><tr><td>5000</td><td>Salaires</td><td class="dim">Charge</td></tr><tr><td>5700</td><td>Charges sociales</td><td class="dim">Charge</td></tr><tr><td>5800</td><td>Autres charges du personnel</td><td class="dim">Charge</td></tr><tr><td>5900</td><td>Charges de personnels temporaires</td><td class="dim">Charge</td></tr></tbody></table></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Composante des charges sociales (5700)</div><div class="keyconcept-body">Part employeur : AVS/AI/APG 5.3 %, AC 1.1 %, LAA accident professionnel, LPP variable selon âge, allocations familiales. Voir Chapitre 05.</div></div></section><section class="section" id="s-B-6"><div class="section-num"><span>§ B.6</span><span class="tag">Résultat</span></div><h2 class="section-title">Classe 6 — Autres charges, amortissements, financier</h2><p class="muted">La classe 6 rassemble les autres charges d'exploitation (locaux, véhicules, administration), les amortissements et le résultat financier.</p><div class="dtable"><table><thead><tr><th>Compte</th><th>Libellé</th><th>Nature</th></tr></thead><tbody><tr><td>6000</td><td>Charges de locaux</td><td class="dim">Charge</td></tr><tr><td>6100</td><td>Entretien, réparations et remplacement (exploitation)</td><td class="dim">Charge</td></tr><tr><td>6105</td><td>Leasing immobilisations corporelles meubles</td><td class="dim">Charge</td></tr><tr><td>6200</td><td>Charges de véhicules et de transport</td><td class="dim">Charge</td></tr><tr><td>6260</td><td>Leasing et location de véhicules</td><td class="dim">Charge</td></tr><tr><td>6300</td><td>Assurances-choses, droits, taxes, autorisations</td><td class="dim">Charge</td></tr><tr><td>6400</td><td>Charges d'énergie et évacuation des déchets</td><td class="dim">Charge</td></tr><tr><td>6500</td><td>Charges d'administration</td><td class="dim">Charge</td></tr><tr><td>6570</td><td>Charges et leasing d'informatique</td><td class="dim">Charge</td></tr><tr><td>6600</td><td>Publicité</td><td class="dim">Charge</td></tr><tr><td>6700</td><td>Autres charges d'exploitation</td><td class="dim">Charge</td></tr><tr><td>6800</td><td>Amortissement et ajustement de valeur (immobilisations corporelles)</td><td class="dim">Charge</td></tr><tr><td>6900</td><td>Charges financières</td><td class="dim">Charge</td></tr><tr><td>6950</td><td>Produits financiers</td><td class="dim">Produit</td></tr></tbody></table></div><div class="callout tip"><div class="callout-label">EBIT</div><div>Bénéfice brut − Cl. 5 (personnel) − Cl. 6 (autres charges + amort.) = <strong>EBIT</strong> (excédent brut avant intérêts et taxes). Le résultat financier (6900/6950) est isolé pour préserver la comparabilité.</div></div></section><section class="section" id="s-B-7"><div class="section-num"><span>§ B.7</span><span class="tag">Résultat</span></div><h2 class="section-title">Classe 7 — Activités annexes d'exploitation</h2><p class="muted">La classe 7 retrace les activités annexes à l'exploitation principale — produits accessoires, immeubles d'exploitation. Permet de séparer la rentabilité courante de la rentabilité accessoire.</p><div class="dtable"><table><thead><tr><th>Compte</th><th>Libellé</th><th>Nature</th></tr></thead><tbody><tr><td>7000</td><td>Produits accessoires</td><td class="dim">Produit</td></tr><tr><td>7010</td><td>Charges accessoires</td><td class="dim">Charge</td></tr><tr><td>7500</td><td>Produits des immeubles d'exploitation</td><td class="dim">Produit</td></tr><tr><td>7510</td><td>Charges des immeubles d'exploitation</td><td class="dim">Charge</td></tr></tbody></table></div></section><section class="section" id="s-B-8"><div class="section-num"><span>§ B.8</span><span class="tag">Résultat</span></div><h2 class="section-title">Classe 8 — Résultats extraordinaires &amp; hors exploitation</h2><p class="muted">La classe 8 isole les éléments non récurrents ou non liés à l'exploitation — fondamental pour évaluer la performance économique normale de l'entreprise.</p><div class="dtable"><table><thead><tr><th>Compte</th><th>Libellé</th><th>Nature</th></tr></thead><tbody><tr><td>8000</td><td>Charges hors exploitation</td><td class="dim">Charge</td></tr><tr><td>8100</td><td>Produits hors exploitation</td><td class="dim">Produit</td></tr><tr><td>8500</td><td>Charges extraordinaires, exceptionnelles ou hors période</td><td class="dim">Charge</td></tr><tr><td>8510</td><td>Produits extraordinaires, exceptionnels ou hors période</td><td class="dim">Produit</td></tr><tr><td>8900</td><td>Impôts directs</td><td class="dim">Charge</td></tr></tbody></table></div></section><section class="section" id="s-B-9"><div class="section-num"><span>§ B.9</span><span class="tag">Bouclement</span></div><h2 class="section-title">Classe 9 — Clôture</h2><p class="muted">La classe 9 contient les comptes techniques de clôture — en particulier le compte 9200 qui reçoit le résultat de l'exercice avant son report au bilan (2979).</p><div class="dtable"><table><thead><tr><th>Compte</th><th>Libellé</th><th>Nature</th></tr></thead><tbody><tr><td>9200</td><td>Bénéfice / perte de l'exercice</td><td class="dim">Produit / Charge</td></tr></tbody></table></div><div class="keyconcept"><div class="keyconcept-label">Concept clé</div><div class="keyconcept-title">Cheminement du résultat</div><div class="keyconcept-body">Soldes Cl. 3 à 8 → compte 9200 (Clôture) → compte 2979 (Bénéfice/perte de l'exercice au bilan) → puis répartition lors de l'AG (réserves, dividendes, report à nouveau).</div></div><div class="compare"><div class="compare-side"><div class="head">De l'année N</div><div class="title">Soldes du compte de résultat</div><ul><li>9200 Reçoit tous les soldes des classes 3 à 8</li><li>Solde positif = bénéfice / négatif = perte</li></ul></div><div class="compare-divider">→</div><div class="compare-side"><div class="head">Vers le bilan</div><div class="title">Affectation au passif</div><ul><li>2979 Bénéfice / perte de l'exercice</li><li>Réparti à l'AG : réserves, dividendes, report</li></ul></div></div><div class="lawarticle"><div class="lawarticle-tag">Art. 959b CO<span class="ref">Code des obligations</span></div><div class="lawarticle-body">Doivent figurer dans le compte de résultat, séparément, les charges et produits extraordinaires, uniques ou hors période — pour permettre une appréciation correcte de la performance courante.</div></div></section><section class="section" id="s-B-10"><div class="section-num"><span>§ B.10</span></div><h2 class="section-title">Référence bibliographique</h2><p>Ce plan est l'adaptation francophone officielle du <em>Kontenrahmen KMU</em> suisse alémanique. Il est utilisé par toutes les écoles professionnelles de Suisse romande, par la majorité des fiduciaires et par les éditions LEP comme référence pédagogique de la formation en comptabilité (CFC employé-e de commerce, brevet fédéral, diplôme fédéral).</p><div class="callout note"><div class="callout-label">© FynUp Consulting</div><div>Le présent document est développé par FynUp Consulting. Il n'est pas permis de distribuer, vendre ou reproduire tout ou partie de ce document sans autorisation préalable écrite de FynUp Consulting, marque déposée. Plan comptable de référence : Sterchi W., Mattle H., Helbling M. — Plan comptable suisse PME — version officielle de référence — Éditions LEP, 2014.</div></div></section></template>

const READ_KEY = "fynup-read-chapters-static";
function loadRead(){ try { return new Set(JSON.parse(localStorage.getItem(READ_KEY)||"[]")); } catch(e){ return new Set(); } }
function saveRead(s){ try { localStorage.setItem(READ_KEY, JSON.stringify([...s])); } catch(e){} }
let readSet = loadRead();
const pad = n => String(n).padStart(2,"0");
const byModule = id => COURSE.filter(c => c.moduleId === id);

// ---------- Sidebar ----------
function renderSidebar(current){
  const q = (document.getElementById("search")?.value || "").toLowerCase();
  const match = s => !q || (s||"").toLowerCase().includes(q);
  let html = "";
  html += '<div class="nav-chapter '+(current==="home"?"active":"")+'" data-nav="home"><span class="nav-chapter-num">▦</span>Sommaire</div>';
  for(const m of MODULES){
    const chs = byModule(m.id).filter(c => match(c.title)||match(m.label)||match(m.name)||match(String(c.num)));
    if(!chs.length) continue;
    html += '<div class="nav-module">'+m.label+' · '+m.name+'</div>';
    for(const c of chs){
      const read = readSet.has(c.id);
      html += '<div class="nav-chapter '+(current===c.id?"active ":"")+(read?"read":"")+'" data-nav="'+c.id+'"><span class="nav-chapter-num">'+(read?"✓":pad(c.num))+'</span>'+c.title+'</div>';
    }
  }
  document.getElementById("nav").innerHTML = html;
  const pct = Math.round(readSet.size/COURSE.length*100);
  document.getElementById("sp-count").textContent = readSet.size+" / "+COURSE.length;
  document.getElementById("sp-fill").style.width = pct+"%";
}

// ---------- Landing ----------
function renderLanding(){
  const total = COURSE.length, readCount = readSet.size;
  const pct = Math.round(readCount/total*100);
  const next = COURSE.find(c => !readSet.has(c.id));
  let mods = "";
  for(const m of MODULES){
    const chs = byModule(m.id);
    if(!chs.length) continue;
    const mr = chs.filter(c=>readSet.has(c.id)).length;
    let rows = "";
    for(const c of chs){
      const read = readSet.has(c.id);
      rows += '<div class="toc-chapter '+(read?"read":"")+'" data-nav="'+c.id+'"><span class="toc-chapter-num">'+(read?"✓":pad(c.num))+'</span><span class="toc-chapter-title">'+c.title+'</span><span class="toc-chapter-meta">'+c.meta+'</span></div>';
    }
    mods += '<div class="toc-module"><div class="toc-module-head"><span class="acc">'+m.label+'</span><span>·</span><span>'+m.name+'</span><span class="toc-module-progress">'+mr+'/'+chs.length+'</span></div><div class="toc-chapters">'+rows+'</div></div>';
  }
  const cta = next ? '<div class="cover-cta"><div class="cover-cta-info"><div class="cover-cta-label">'+(readCount===0?"Commencer par":"Reprendre — "+pct+"% lus")+'</div><div class="cover-cta-title">Ch. '+pad(next.num)+' · '+next.title+'</div></div><button class="cover-cta-btn" data-nav="'+next.id+'">'+(readCount===0?"Commencer la lecture":"Reprendre")+' →</button></div>' : '';
  document.getElementById("main").innerHTML =
    '<div class="toc"><div class="cover-card"><div class="cover-top"><img src="'+LOGO+'" alt="FynUp Consulting" style="height:44px"><span class="cover-edition">Document pédagogique</span></div>'+
    '<div class="cover-eyebrow">FynUp Academy</div>'+
    '<h1 class="toc-title">La comptabilité,<br><em>simplement.</em></h1>'+
    '<p class="toc-lede">Bilan · Compte de résultat · TVA · Amortissements · Provisions · Analyse financière</p>'+
    '<div class="cover-meta"><div><div class="cover-meta-label">Chapitres</div><div class="cover-meta-value">17<span class="cover-meta-sub"> + 2 annexes</span></div></div>'+
    '<div><div class="cover-meta-label">Cadre</div><div class="cover-meta-value-sm">Plan comptable<br>PME suisse</div></div>'+
    '<div><div class="cover-meta-label">Référence</div><div class="cover-meta-value-sm">Code des<br>obligations (CO)</div></div>'+
    '<div><div class="cover-meta-label">Format</div><div class="cover-meta-value-sm">Lecture<br>interactive</div></div></div>'+cta+'</div>'+
    '<div class="toc-section-label"><span>Sommaire</span><span>Programme du cours · '+total+' chapitres</span></div>'+
    '<div class="toc-modules">'+mods+'</div>'+
    '<div class="toc-footer">Document exclusif FynUp Consulting · Tous droits réservés · Marque déposée</div></div>';
  document.title = "Cours FynUp — Comptabilité Générale";
}

// ---------- Chapter ----------
let scrollHandler = null, keyHandler = null, io = null;
function renderChapter(id){
  const idx = COURSE.findIndex(c=>c.id===id);
  const ch = COURSE[idx];
  const prev = idx>0 ? COURSE[idx-1] : null;
  const next = idx<COURSE.length-1 ? COURSE[idx+1] : null;
  const m = MODULES.find(x=>x.id===ch.moduleId);
  const tpl = document.getElementById("tpl-"+id);
  const body = tpl ? tpl.innerHTML : "<p>Contenu indisponible</p>";

  const footPrev = prev ? '<a class="chapter-foot-link prev" data-nav="'+prev.id+'"><div class="dir">Précédent</div><div class="next-title">'+prev.title+'</div></a>' : '<div></div>';
  const footNext = next ? '<a class="chapter-foot-link next" data-nav="'+next.id+'"><div class="dir">Suivant</div><div class="next-title">'+next.title+'</div></a>' : '<div></div>';

  document.getElementById("main").innerHTML =
    '<div class="reading-progress" id="rprog"></div>'+
    '<div class="chapter-bar"><button class="chapter-bar-back" data-nav="home" title="Retour au sommaire (Échap)"><span class="cb-arrow">←</span><span class="cb-text">Sommaire</span></button>'+
    '<div class="chapter-bar-crumb"><span class="crumb-module">'+m.label+' · '+m.name+'</span><span class="crumb-sep">/</span><span class="crumb-chapter">Ch. '+pad(ch.num)+' — '+ch.title+'</span></div>'+
    '<div class="chapter-bar-meta"><span class="cb-progress-num" id="cbpct">0%</span><span class="cb-kbd-hints"><kbd>←</kbd><kbd>→</kbd></span></div></div>'+
    '<div class="chapter-layout"><article class="chapter-main" id="chapter-main">'+body+
    '<div class="chapter-foot">'+footPrev+footNext+'</div>'+
    '<div class="chapter-back-home"><button data-nav="home">← Retour au sommaire</button></div>'+
    '</article><aside class="chapter-toc"><div class="chapter-toc-label">Dans ce chapitre</div><ol class="chapter-toc-list" id="ctoc"></ol>'+
    '<div class="chapter-toc-foot"><button class="back-top" id="backtop">↑ Haut de page</button></div></aside></div>';

  document.title = "Ch. "+pad(ch.num)+" — "+ch.title+" · FynUp";
  window.scrollTo(0,0);

  // mini-toc
  const secs = [...document.querySelectorAll("#chapter-main .section")].map(el=>{
    const numEl = el.querySelector(".section-num span");
    const titleEl = el.querySelector(".section-title");
    return { id: el.id, num: numEl?numEl.textContent.replace(/§\s*/,""):"", title: titleEl?titleEl.textContent:"" };
  });
  document.getElementById("ctoc").innerHTML = secs.map(s=>'<li data-sec="'+s.id+'"><span class="toc-num">'+s.num+'</span><span class="toc-title-mini">'+s.title+'</span></li>').join("");

  document.getElementById("backtop").onclick = ()=>window.scrollTo({top:0,behavior:"smooth"});
  document.querySelectorAll("#ctoc li").forEach(li=>{
    li.onclick = ()=>{ const el=document.getElementById(li.dataset.sec); if(el){ window.scrollTo({top: el.getBoundingClientRect().top+window.scrollY-80, behavior:"smooth"}); } };
  });

  // reveal animation
  if(io) io.disconnect();
  io = new IntersectionObserver((entries)=>{ entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add("in-view"); }); }, {rootMargin:"0px 0px -10% 0px", threshold:0.05});
  document.querySelectorAll("#chapter-main .section, #chapter-main .objectives, #chapter-main .keyconcept, #chapter-main .journal, #chapter-main .dtable, #chapter-main .formula, #chapter-main .compare, #chapter-main .lawarticle, #chapter-main .threeup, #chapter-main .fourup, #chapter-main .callout, #chapter-main .plan-section, #chapter-main .lex").forEach(el=>{ el.classList.add("reveal"); io.observe(el); });

  // scroll spy + progress
  if(scrollHandler) window.removeEventListener("scroll", scrollHandler);
  let ticking=false;
  scrollHandler = ()=>{
    if(ticking) return; ticking=true;
    requestAnimationFrame(()=>{
      ticking=false;
      const sy=window.scrollY, dh=document.documentElement.scrollHeight-window.innerHeight;
      const p = dh>0 ? Math.min(1,Math.max(0,sy/dh)) : 0;
      const rp=document.getElementById("rprog"); if(rp) rp.style.transform="scaleX("+p+")";
      const pc=document.getElementById("cbpct"); if(pc) pc.textContent=Math.round(p*100)+"%";
      if(p>=0.85 && !readSet.has(id)){ readSet.add(id); saveRead(readSet); }
      let active=null;
      document.querySelectorAll("#chapter-main .section").forEach(s=>{ if(s.getBoundingClientRect().top<200) active=s.id; });
      document.querySelectorAll("#ctoc li").forEach(li=>li.classList.toggle("active", li.dataset.sec===active));
    });
  };
  window.addEventListener("scroll", scrollHandler, {passive:true});
  scrollHandler();

  // keyboard
  if(keyHandler) window.removeEventListener("keydown", keyHandler);
  keyHandler = (e)=>{
    if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA") return;
    if(e.metaKey||e.ctrlKey||e.altKey) return;
    if(e.key==="ArrowLeft" && prev){ e.preventDefault(); navigate(prev.id); }
    if(e.key==="ArrowRight" && next){ e.preventDefault(); navigate(next.id); }
    if(e.key==="Escape"){ navigate("home"); }
  };
  window.addEventListener("keydown", keyHandler);
}

async function fcLogin() {

      method: "POST",

(function() {

    var params = {};

      var kv = p.split("="); params[kv[0]] = decodeURIComponent(kv[1]||"");
    });
    var tok = params["access_token"];
    var type = params["type"];
    if (tok && (type === "invite" || type === "signup" || type === "recovery" || type === "magiclink")) {
      fcToken = tok;
      fetch(fcSB + "/auth/v1/user", {headers:{"apikey":fcSK,"Authorization":"Bearer "+tok}})

      .catch(function(){try{localStorage.removeItem("fc_tok");}catch(e){}});
    }
  } catch(e) {}
})();
